<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productivity</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='4' y='2' width='24' height='28' rx='4' fill='%23faf9f5' stroke='%23D97757' stroke-width='2'/%3E%3Crect x='8' y='0' width='16' height='5' rx='2.5' fill='%23D97757'/%3E%3Cpath d='M9 13l3 3 5-5' fill='none' stroke='%23D97757' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Crect x='20' y='12' width='5' height='2' rx='1' fill='%23c4c4c2'/%3E%3Crect x='9' y='20' width='10' height='2' rx='1' fill='%23c4c4c2'/%3E%3Crect x='9' y='25' width='7' height='2' rx='1' fill='%23c4c4c2'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #faf9f5;
      --bg-secondary: #F5F4EF;
      --bg-card: #ffffff;
      --text-primary: #141413;
      --text-secondary: #5c5c5a;
      --text-muted: #8c8c8a;
      --accent: #D97757;
      --accent-hover: #c4684a;
      --border: #e5e4df;
      --border-light: #eeeee9;
      --shadow: rgba(20, 20, 19, 0.04);
      --shadow-hover: rgba(20, 20, 19, 0.08);
    }

    [data-theme="dark"] {
      --bg-primary: #1a1a1a;
      --bg-secondary: #242424;
      --bg-card: #2a2a2a;
      --text-primary: #e8e6e1;
      --text-secondary: #a8a8a6;
      --text-muted: #6e6e6c;
      --accent: #D97757;
      --accent-hover: #e88a6a;
      --border: #3a3a3a;
      --border-light: #333333;
      --shadow: rgba(0, 0, 0, 0.15);
      --shadow-hover: rgba(0, 0, 0, 0.25);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      padding: 20px 24px;
      line-height: 1.5;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 12px; color: var(--text-secondary); }

    .header-left {
      display: flex;
      align-items: flex-start;
      gap: 0;
    }

    .view-toggle {
      display: flex;
      gap: 4px;
      background: var(--bg-secondary);
      padding: 4px;
      border-radius: 8px;
      margin-left: 16px;
    }

    .view-toggle button {
      background: transparent;
      border: none;
      padding: 6px 14px;
      font-size: 13px;
      color: var(--text-muted);
      border-radius: 6px;
    }

    .view-toggle button:hover {
      color: var(--text-primary);
      background: transparent;
    }

    .view-toggle button.active {
      background: var(--bg-card);
      color: var(--text-primary);
      box-shadow: 0 1px 3px var(--shadow);
    }

    .buttons { display: flex; gap: 12px; }

    button {
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border);
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      transition: all 0.15s ease;
    }

    button:hover {
      background: var(--bg-secondary);
      border-color: var(--text-muted);
    }

    button.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    button.primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ===== TASKS STYLES ===== */

    .board {
      display: flex;
      gap: 24px;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 24px;
      flex: 1;
      min-height: 0;
    }

    .column {
      background: var(--bg-secondary);
      border-radius: 12px;
      min-width: 340px;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      height: 100%;
      max-height: 100%;
    }

    .column-header {
      padding: 16px 18px;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: grab;
    }

    .column-header:active {
      cursor: grabbing;
    }

    .column.dragging-column {
      opacity: 0.5;
    }

    .column-drop-indicator {
      width: 3px;
      background: var(--accent);
      border-radius: 2px;
      margin: 0 -2px;
      min-height: 100px;
    }

    .column-header .count {
      background: var(--bg-card);
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .column:hover .remove-section-btn { opacity: 0.5 !important; }
    .column:hover .remove-section-btn:hover { opacity: 1 !important; color: var(--accent) !important; }

    .cards {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 12px;
      min-height: 100px;
    }

    .cards.drag-over {
      background: rgba(217, 119, 87, 0.05);
      border-radius: 8px;
    }

    .task-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
      cursor: grab;
      transition: all 0.15s ease;
      box-shadow: 0 1px 3px var(--shadow);
      position: relative;
    }

    .task-card:hover {
      box-shadow: 0 4px 12px var(--shadow-hover);
      border-color: var(--border);
    }

    .task-card .add-on-hover {
      display: none;
    }

    .task-card:hover .add-on-hover {
      display: block;
    }

    .task-card .delete-btn {
      display: none;
      position: absolute;
      top: 8px;
      right: 8px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 6px;
      font-size: 14px;
      line-height: 1;
      border-radius: 4px;
    }

    .task-card:hover .delete-btn {
      display: block;
    }

    .task-card .delete-btn:hover {
      background: var(--bg-secondary);
      color: var(--accent);
    }

    .task-card.dragging {
      opacity: 0.5;
      transform: rotate(2deg);
    }

    .card-title {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.5;
      color: var(--text-primary);
    }

    .card-note {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 6px;
      line-height: 1.4;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    .card-subtasks {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border-light);
      font-size: 13px;
      color: var(--text-secondary);
    }

    .subtask {
      padding: 3px 0;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .checkbox {
      width: 18px;
      height: 18px;
      min-width: 18px;
      min-height: 18px;
      flex-shrink: 0;
      border: 2px solid var(--border);
      border-radius: 5px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      vertical-align: middle;
      cursor: pointer;
      transition: all 0.15s ease;
      background: var(--bg-card);
    }

    .checkbox:hover {
      border-color: var(--accent);
    }

    .checkbox.checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .checkbox.checked::after {
      content: '';
      width: 5px;
      height: 9px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
      margin-bottom: 2px;
    }

    .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: var(--text-muted);
    }

    .empty-state button {
      font-size: 16px;
      padding: 14px 28px;
      background: var(--accent);
      border: none;
      color: white;
    }

    .empty-state button:hover {
      background: var(--accent-hover);
    }

    .status-bar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text-primary);
      color: var(--bg-primary);
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.2s ease;
      box-shadow: 0 4px 20px rgba(20, 20, 19, 0.15);
      z-index: 200;
    }

    .status-bar.visible { opacity: 1; }

    .add-card {
      padding: 12px;
    }

    .add-card button {
      width: 100%;
      background: transparent;
      border: 2px dashed var(--border);
      color: var(--text-muted);
      font-weight: 500;
    }

    .add-card button:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: transparent;
    }

    .new-task-input {
      width: 100%;
      background: var(--bg-card);
      border: 2px solid var(--accent);
      border-radius: 8px;
      padding: 12px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      resize: none;
    }

    .new-task-input:focus {
      outline: none;
    }

    .new-task-input::placeholder {
      color: var(--text-muted);
    }

    /* Scrollbar styling */
    .cards::-webkit-scrollbar,
    .list-view::-webkit-scrollbar {
      width: 6px;
    }

    .cards::-webkit-scrollbar-track,
    .list-view::-webkit-scrollbar-track {
      background: transparent;
    }

    .cards::-webkit-scrollbar-thumb,
    .list-view::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .cards::-webkit-scrollbar-thumb:hover,
    .list-view::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* List View Styles */
    .list-view {
      max-width: 800px;
      margin: 0 auto;
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      min-height: 0;
    }

    .list-section {
      margin-bottom: 28px;
    }

    .list-section.drag-over {
      background: rgba(217, 119, 87, 0.05);
      border-radius: 8px;
      margin: 0 -12px 32px;
      padding: 0 12px;
    }

    .list-section-header {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      padding: 4px 0;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .list-section-header .section-title {
      cursor: pointer;
    }

    .list-section-header .section-title:hover {
      color: var(--text-primary);
    }

    .list-section-header .count {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .list-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 14px;
      margin-bottom: 6px;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      cursor: grab;
      position: relative;
      border-radius: 10px;
      transition: all 0.15s ease;
      box-shadow: 0 1px 3px var(--shadow);
    }

    .list-item:active {
      cursor: grabbing;
    }

    .list-item:hover {
      box-shadow: 0 4px 12px var(--shadow-hover);
      border-color: var(--border);
    }

    .list-item.dragging {
      opacity: 0.5;
      background: var(--bg-secondary);
    }

    .list-item .checkbox {
      margin-top: 2px;
      flex-shrink: 0;
    }

    .list-item-content {
      flex: 1;
      min-width: 0;
    }

    .list-item-title {
      font-size: 15px;
      color: var(--text-primary);
      line-height: 1.4;
    }

    .list-item-title.checked {
      color: var(--text-muted);
      text-decoration: line-through;
    }

    .list-item-note {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
      cursor: pointer;
    }

    .list-item-note:hover {
      color: var(--text-secondary);
    }

    .list-item-note.add-note {
      font-style: italic;
      display: none;
    }

    .list-item:hover .list-item-note.add-note {
      display: block;
    }

    .list-item-subtasks {
      margin-top: 8px;
      padding-left: 2px;
    }

    .list-item-subtask {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 3px 0;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .list-item-subtask .checkbox {
      width: 16px;
      height: 16px;
      min-width: 16px;
      min-height: 16px;
      margin-top: 1px;
    }

    .list-item-subtask span {
      cursor: pointer;
    }

    .list-item-subtask span:hover {
      color: var(--text-primary);
    }

    .list-item-add-subtask {
      font-size: 13px;
      color: var(--text-muted);
      font-style: italic;
      cursor: pointer;
      padding: 3px 0;
      padding-left: 24px;
      display: none;
    }

    .list-item:hover .list-item-add-subtask {
      display: block;
    }

    .list-item-add-subtask:hover {
      color: var(--accent);
    }

    .list-item-section {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg-secondary);
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
    }

    .list-item-actions {
      display: none;
      position: absolute;
      top: 8px;
      right: 8px;
    }

    .list-item:hover .list-item-actions {
      display: flex;
      gap: 4px;
    }

    .list-item-actions button {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 6px;
      font-size: 14px;
      line-height: 1;
      border-radius: 4px;
    }

    .list-item-actions button:hover {
      background: var(--bg-card);
      color: var(--accent);
    }

    .list-drop-indicator {
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
      margin: 2px -12px;
    }

    .list-add-section {
      margin-top: 16px;
      padding: 16px;
      border: 2px dashed var(--border);
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      transition: all 0.15s ease;
    }

    .list-add-section:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .quick-add {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
    }

    .quick-add-input {
      flex: 1;
      background: transparent;
      border: none;
      font-size: 15px;
      color: var(--text-primary);
      font-family: inherit;
      outline: none;
    }

    .quick-add-input::placeholder {
      color: var(--text-muted);
    }

    .quick-add-section {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--bg-secondary);
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid var(--border);
    }

    .quick-add-section:hover {
      border-color: var(--accent);
    }

    .section-picker {
      position: absolute;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 4px 20px var(--shadow-hover);
      padding: 4px;
      z-index: 100;
    }

    .section-picker button {
      display: block;
      width: 100%;
      text-align: left;
      padding: 8px 12px;
      font-size: 13px;
      background: transparent;
      border: none;
      border-radius: 6px;
    }

    .section-picker button:hover {
      background: var(--bg-secondary);
    }

    /* ===== MEMORY STYLES ===== */

    .memory-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
      flex-wrap: wrap;
      background: var(--bg-secondary);
      padding: 4px;
      border-radius: 8px;
      flex-shrink: 0;
    }

    .memory-tab {
      background: transparent;
      color: var(--text-muted);
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s ease;
      text-transform: capitalize;
    }

    .memory-tab:hover { color: var(--text-primary); }

    .memory-tab.active {
      color: var(--text-primary);
      background: var(--bg-card);
      box-shadow: 0 1px 3px var(--shadow);
    }

    .memory-tab .count {
      background: var(--bg-secondary);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      margin-left: 6px;
      color: var(--text-muted);
    }

    .memory-tab.active .count {
      background: var(--border-light);
    }

    .memory-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .memory-flat-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .memory-flat-table th {
      text-align: left;
      padding: 10px 16px;
      font-weight: 500;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .memory-flat-table td {
      padding: 9px 16px;
      border-bottom: 1px solid var(--border-light);
      color: var(--text-primary);
      line-height: 1.4;
    }

    .memory-flat-table td:first-child {
      color: var(--text-muted);
      font-weight: 500;
      white-space: nowrap;
      width: 120px;
    }

    .memory-flat-table tr:last-child td {
      border-bottom: none;
    }

    .memory-flat-table tr:hover td {
      background: var(--bg-secondary);
    }

    .memory-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: 0 1px 3px var(--shadow);
    }

    .memory-card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 12px var(--shadow-hover);
    }

    .memory-card-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-primary);
    }

    .memory-card-meta {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .memory-card-preview {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
    }

    .memory-card-fields {
      margin-top: 10px;
      font-size: 12px;
    }

    .memory-card-field {
      display: flex;
      gap: 8px;
      margin-bottom: 4px;
    }

    .memory-card-field-label {
      color: var(--text-muted);
      min-width: 80px;
    }

    .memory-card-field-value {
      color: var(--text-secondary);
    }

    .file-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      margin-bottom: 16px;
      box-shadow: 0 1px 3px var(--shadow);
    }

    .file-card-header {
      padding: 16px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .file-card-header:hover {
      background: var(--bg-secondary);
    }

    .file-card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .file-card-content {
      padding: 16px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      overflow-y: auto;
      display: none;
      color: var(--text-secondary);
    }

    .file-card-content.expanded {
      display: block;
    }

    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .stat {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      padding: 16px 24px;
      min-width: 100px;
      box-shadow: 0 1px 3px var(--shadow);
    }

    .stat-value {
      font-size: 28px;
      font-weight: 600;
      color: var(--accent);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: capitalize;
      margin-top: 4px;
    }

    .search-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }

    .search-box input::placeholder {
      color: var(--text-muted);
    }

    .add-btn {
      background: transparent;
      border: 2px dashed var(--border);
      color: var(--text-muted);
      padding: 40px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 500;
    }

    .add-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .markdown-content {
      line-height: 1.6;
      color: var(--text-secondary);
    }

    .markdown-content h1 { font-size: 1.4em; margin: 16px 0 8px; color: var(--text-primary); }
    .markdown-content h2 { font-size: 1.2em; margin: 14px 0 6px; color: var(--text-primary); }
    .markdown-content h3 { font-size: 1.1em; margin: 12px 0 4px; color: var(--text-secondary); }
    .markdown-content p { margin: 8px 0; }
    .markdown-content ul, .markdown-content ol { margin: 8px 0 8px 20px; }
    .markdown-content li { margin: 4px 0; }
    .markdown-content code {
      background: var(--bg-secondary);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      color: var(--text-primary);
    }
    .markdown-content pre {
      background: var(--bg-secondary);
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 8px 0;
      border: 1px solid var(--border-light);
    }
    .markdown-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 8px 0;
      font-size: 13px;
    }
    .markdown-content th, .markdown-content td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border-light);
    }
    .markdown-content th {
      background: var(--bg-secondary);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(20, 20, 19, 0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.visible {
      display: flex;
    }

    .modal {
      background: var(--bg-card);
      border-radius: 12px;
      width: 90%;
      max-width: 800px;
      max-height: 85vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(20, 20, 19, 0.2);
    }

    .modal-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .modal-close {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 24px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }

    .modal-close:hover { color: var(--text-primary); }

    .modal-body {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }

    .modal-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .form-group textarea {
      width: 100%;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      color: var(--text-primary);
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      line-height: 1.5;
      min-height: 300px;
      resize: vertical;
    }

    .form-group textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* Tab panel containers */
    .tab-panel {
      display: none;
      flex: 1;
      min-height: 0;
      flex-direction: column;
    }

    .tab-panel.active {
      display: flex;
    }

    /* Memory panel scrollable area */
    .memory-content-area {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    .memory-content-area::-webkit-scrollbar {
      width: 6px;
    }

    .memory-content-area::-webkit-scrollbar-track {
      background: transparent;
    }

    .memory-content-area::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .memory-content-area::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    .file-card-content::-webkit-scrollbar,
    .modal-body::-webkit-scrollbar {
      width: 6px;
    }

    .file-card-content::-webkit-scrollbar-track,
    .modal-body::-webkit-scrollbar-track {
      background: transparent;
    }

    .file-card-content::-webkit-scrollbar-thumb,
    .modal-body::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .file-card-content::-webkit-scrollbar-thumb:hover,
    .modal-body::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* File path display */
    .file-path {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ─── Memory Database Table ───────────────────────────────── */
    .mem-db-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-shrink: 0;
    }
    .mem-db-toolbar .brain-search { flex: 1; max-width: 320px; }
    .mem-db-toolbar .mem-db-count {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: auto;
    }

    .mem-db-wrap {
      overflow: auto;
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg-card);
    }

    .mem-db-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      table-layout: fixed;
    }

    .mem-db-table thead {
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .mem-db-table th {
      background: var(--bg-secondary);
      border-bottom: 2px solid var(--border);
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-secondary);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      position: relative;
    }
    .mem-db-table th:hover { color: var(--text-primary); }
    .mem-db-table th .sort-arrow {
      font-size: 10px;
      margin-left: 4px;
      opacity: 0.4;
    }
    .mem-db-table th.sorted .sort-arrow { opacity: 1; color: var(--accent); }

    .mem-db-table td {
      padding: 9px 14px;
      border-bottom: 1px solid var(--border-light);
      color: var(--text-primary);
      vertical-align: top;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mem-db-table tr:last-child td { border-bottom: none; }

    .mem-db-table tbody tr {
      transition: background 0.1s;
      cursor: pointer;
    }
    .mem-db-table tbody tr:hover { background: var(--bg-secondary); }

    .mem-db-name {
      font-weight: 500;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mem-db-folder {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--bg-secondary);
      padding: 2px 8px;
      border-radius: 4px;
      display: inline-block;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mem-db-preview {
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .mem-db-tasks-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .mem-db-date {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .mem-db-actions {
      display: flex;
      gap: 4px;
    }
    .mem-db-actions button {
      background: transparent;
      border: 1px solid var(--border);
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 11px;
      color: var(--text-secondary);
      cursor: pointer;
    }
    .mem-db-actions button:hover {
      background: var(--bg-secondary);
      color: var(--text-primary);
    }
    .mem-db-actions button.import-btn {
      color: var(--accent);
      border-color: var(--accent);
    }
    .mem-db-actions button.import-btn:hover {
      background: color-mix(in srgb, var(--accent) 10%, transparent);
    }

    .mem-db-view-toggle {
      display: flex;
      gap: 2px;
      background: var(--bg-secondary);
      padding: 3px;
      border-radius: 7px;
    }
    .mem-db-view-toggle button {
      background: transparent;
      border: none;
      padding: 5px 12px;
      font-size: 12px;
      color: var(--text-muted);
      border-radius: 5px;
      cursor: pointer;
    }
    .mem-db-view-toggle button.active {
      background: var(--bg-card);
      color: var(--text-primary);
      box-shadow: 0 1px 3px var(--shadow);
    }

    .mem-db-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: var(--text-muted);
      text-align: center;
    }
    .mem-db-empty p { font-size: 15px; margin-bottom: 8px; }

    /* Column widths */
    .mem-db-table .col-name { width: 22%; }
    .mem-db-table .col-folder { width: 14%; }
    .mem-db-table .col-preview { width: 30%; }
    .mem-db-table .col-tasks { width: 10%; }
    .mem-db-table .col-date { width: 12%; }
    .mem-db-table .col-actions { width: 12%; }

    /* ─── Brain Tab Styles ──────────────────────────────────────── */
    .brain-layout {
      display: flex;
      gap: 20px;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .brain-sidebar {
      width: 240px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
    }

    .brain-sidebar-section {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      padding: 12px 12px 4px;
    }

    .brain-cat-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-secondary);
      text-align: left;
      width: 100%;
      transition: all 0.15s;
    }

    .brain-cat-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }
    .brain-cat-btn.active { background: var(--accent); color: #fff; font-weight: 500; }
    .brain-cat-btn .cat-count {
      font-size: 12px;
      opacity: 0.7;
      background: rgba(0,0,0,0.08);
      padding: 1px 7px;
      border-radius: 8px;
    }
    .brain-cat-btn.active .cat-count { background: rgba(255,255,255,0.25); }

    .brain-add-cat {
      padding: 8px 14px;
      border: 1px dashed var(--border);
      border-radius: 10px;
      background: none;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-muted);
      text-align: left;
      width: 100%;
      transition: all 0.15s;
    }
    .brain-add-cat:hover { border-color: var(--accent); color: var(--accent); }

    .brain-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .brain-toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .brain-search {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 14px;
    }

    .brain-search input {
      border: none;
      background: none;
      outline: none;
      font-size: 14px;
      color: var(--text-primary);
      width: 100%;
      font-family: inherit;
    }

    .brain-entries {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-right: 4px;
    }

    .brain-entry {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 16px 20px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .brain-entry:hover { border-color: var(--accent); box-shadow: 0 2px 12px var(--shadow-hover); }

    .brain-entry-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 6px;
    }

    .brain-entry-title {
      font-weight: 600;
      font-size: 15px;
      color: var(--text-primary);
    }

    .brain-entry-date {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      margin-left: 12px;
    }

    .brain-entry-preview {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .brain-entry-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .brain-tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 6px;
      background: var(--bg-secondary);
      color: var(--text-muted);
      border: 1px solid var(--border-light);
    }

    .brain-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .brain-empty p { margin-bottom: 16px; font-size: 16px; font-weight: 500; color: var(--text-secondary); }

    /* Brain detail view (shown in modal) */
    .brain-detail-content {
      min-height: 300px;
    }

    .brain-detail-content textarea {
      width: 100%;
      min-height: 280px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--text-primary);
      resize: vertical;
      line-height: 1.6;
    }

    .brain-detail-meta {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .brain-detail-meta input {
      flex: 1;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      color: var(--text-primary);
      font-family: inherit;
    }

    .brain-delete-btn {
      background: none;
      border: 1px solid #e74c3c;
      color: #e74c3c;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }
    .brain-delete-btn:hover { background: #e74c3c; color: white; }

    .brain-modal-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <svg width="28" height="28" viewBox="0 0 32 32" style="margin-right: 12px; flex-shrink: 0;">
        <rect x="4" y="2" width="24" height="28" rx="4" fill="#faf9f5" stroke="#D97757" stroke-width="2"/>
        <rect x="8" y="0" width="16" height="5" rx="2.5" fill="#D97757"/>
        <path d="M9 13l3 3 5-5" fill="none" stroke="#D97757" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="20" y="12" width="5" height="2" rx="1" fill="#c4c4c2"/>
        <rect x="9" y="20" width="10" height="2" rx="1" fill="#c4c4c2"/>
        <rect x="9" y="25" width="7" height="2" rx="1" fill="#c4c4c2"/>
      </svg>
      <div>
        <h1>Productivity</h1>
        <div id="filePath" class="file-path"></div>
      </div>
      <div class="view-toggle" id="mainTabToggle">
        <button id="tasksTabBtn" class="active">Tasks</button>
        <button id="memoryTabBtn">Memory</button>
        <button id="brainTabBtn">Brain</button>
      </div>
      <div class="view-toggle" id="taskViewToggle">
        <button id="boardViewBtn" class="active">Board</button>
        <button id="listViewBtn">List</button>
      </div>
    </div>
    <div class="buttons">
      <button id="openTaskBtn">Select File</button>
      <button id="openMemoryBtn" style="display: none;">Open Folder</button>
      <button id="saveBtn" class="primary" disabled style="display: none;">Save</button>
      <button id="dbSaveBtn" onclick="exportDatabase()" title="Save database to file" style="width: 38px; height: 38px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; border-radius: 10px;">&#128190;</button>
      <button id="themeToggle" title="Toggle dark mode" style="width: 38px; height: 38px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; border-radius: 10px;">&#9790;</button>
    </div>
  </header>

  <!-- TASKS TAB PANEL -->
  <div class="tab-panel active" id="tasksPanel">
    <div class="list-view" id="listView" style="display: none;"></div>
    <div class="board" id="board">
      <div class="empty-state" id="boardEmptyState" style="width: 100%;">
        <p style="margin-bottom: 24px; font-size: 18px; font-weight: 600; color: var(--text-primary);">Select your TASKS.md file</p>
        <button id="openBtnLarge">Select TASKS.md</button>
      </div>
    </div>
  </div>

  <!-- MEMORY TAB PANEL -->
  <div class="tab-panel" id="memoryPanel">
    <!-- Database view (always visible — persisted) -->
    <div id="memoryDbView" style="display: flex; flex-direction: column; flex: 1; min-height: 0;">
      <div class="mem-db-toolbar">
        <div class="mem-db-view-toggle">
          <button class="active" id="memDbViewBtn" onclick="switchMemoryView('database')">Database</button>
          <button id="memBrowseViewBtn" onclick="switchMemoryView('browse')">Browse</button>
        </div>
        <div class="brain-search" style="max-width: 280px;">
          <span style="color: var(--text-muted);">&#128269;</span>
          <input type="text" placeholder="Search database..." id="memDbSearchInput" oninput="filterMemoryDb(this.value)">
        </div>
        <button id="openMemoryBtn2" onclick="loadMemoryDirectory()" style="font-size: 13px; padding: 6px 14px; background: transparent; border: 1px solid var(--border); border-radius: 7px; cursor: pointer; color: var(--text-secondary);">+ Load Folder</button>
        <span class="mem-db-count" id="memDbCount"></span>
      </div>
      <div class="mem-db-wrap" id="memDbWrap">
        <div class="mem-db-empty" id="memDbEmpty">
          <p>Memory Database</p>
          <span style="font-size: 13px; max-width: 360px;">Load folders to index their files here. Everything persists across sessions.</span>
          <button id="openMemoryBtnLarge" onclick="loadMemoryDirectory()" style="margin-top: 16px;" class="primary">Load Folder</button>
        </div>
        <table class="mem-db-table" id="memDbTable" style="display: none;">
          <thead>
            <tr>
              <th class="col-name" onclick="sortMemoryDb('name')">File <span class="sort-arrow">▼</span></th>
              <th class="col-folder" onclick="sortMemoryDb('folder')">Source <span class="sort-arrow">▼</span></th>
              <th class="col-preview" onclick="sortMemoryDb('preview')">Preview <span class="sort-arrow">▼</span></th>
              <th class="col-tasks" onclick="sortMemoryDb('tasks')">Tasks <span class="sort-arrow">▼</span></th>
              <th class="col-date" onclick="sortMemoryDb('added')">Added <span class="sort-arrow">▼</span></th>
              <th class="col-actions">Actions</th>
            </tr>
          </thead>
          <tbody id="memDbBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Browse view (active folder file-browser) -->
    <div id="memoryBrowseView" style="display: none; flex-direction: column; min-height: 0; flex: 1;">
      <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-shrink: 0;">
        <div class="mem-db-view-toggle">
          <button id="memDbViewBtn2" onclick="switchMemoryView('database')">Database</button>
          <button class="active" id="memBrowseViewBtn2" onclick="switchMemoryView('browse')">Browse</button>
        </div>
        <div class="memory-tabs" id="memoryTabsContainer" style="flex: 1;"></div>
        <div class="brain-search" style="max-width: 220px; flex-shrink: 0;">
          <span style="color: var(--text-muted);">&#128269;</span>
          <input type="text" placeholder="Search files..." id="memorySearchInput">
        </div>
        <button class="primary" id="memoryNewFileBtn" style="white-space: nowrap;">+ New File</button>
      </div>
      <div class="memory-content-area">
        <div id="memoryContentContainer"></div>
      </div>
    </div>
  </div>

  <!-- BRAIN TAB PANEL -->
  <div class="tab-panel" id="brainPanel">
    <div class="brain-layout">
      <div class="brain-sidebar">
        <div class="brain-sidebar-section">Categories</div>
        <div id="brainCatList"></div>
        <button class="brain-add-cat" id="addCatBtn">+ New Category</button>
      </div>
      <div class="brain-main">
        <div class="brain-toolbar">
          <div class="brain-search">
            <span style="color: var(--text-muted);">&#128269;</span>
            <input type="text" placeholder="Search your brain..." id="brainSearchInput">
          </div>
          <button class="primary" id="addEntryBtn">+ New Entry</button>
        </div>
        <div class="brain-entries" id="brainEntries"></div>
      </div>
    </div>
  </div>

  <!-- MODAL (shared for memory and brain) -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Edit</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button id="modalCancel">Cancel</button>
        <button id="modalSave" class="primary">Save</button>
      </div>
    </div>
  </div>

  <div class="status-bar" id="status"></div>

  <script>
    // ===== SHARED STATE =====
    let activeMainTab = localStorage.getItem('dash_activeTab') || 'tasks';

    const statusEl = document.getElementById('status');
    const filePathEl = document.getElementById('filePath');

    function showStatus(msg) {
      statusEl.textContent = msg;
      statusEl.classList.add('visible');
      setTimeout(() => statusEl.classList.remove('visible'), 2000);
    }

    // ===== LOCALSTORAGE HELPERS =====
    function lsGet(key, fallback) {
      try {
        const v = localStorage.getItem(key);
        return v !== null ? JSON.parse(v) : fallback;
      } catch { return fallback; }
    }
    function lsSet(key, value) {
      try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
    }

    // ===== JSON FILE DATABASE =====
    // Durable persistence layer — survives hard reloads, browser clears, etc.
    let dbFileHandle = null;
    let dbDirHandle = null;
    const DB_FILENAME = 'dashboard-db.json';
    let dbSaveTimeout = null;

    // Try to auto-load the DB file from a previously-granted directory
    async function initDatabase() {
      // Check if we have a saved DB in localStorage already
      const hasLocalData = localStorage.getItem('brain_entries') || localStorage.getItem('dash_tasks') || localStorage.getItem('dash_memoryDb');
      if (hasLocalData) return; // localStorage has data, no need to bootstrap

      // No localStorage data — user probably hard-refreshed or cleared cache
      // We can't auto-open files without user gesture, so we'll show a restore button
      showRestoreHint();
    }

    function showRestoreHint() {
      // Only show if there's no brain data and no task data in localStorage
      const hasBrain = lsGet('brain_entries', []).length > 0;
      const hasTasks = lsGet('dash_sections', []).length > 0;
      if (hasBrain || hasTasks) return;

      const hint = document.createElement('div');
      hint.id = 'restoreHint';
      hint.style.cssText = 'position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); background: var(--bg-card); border: 1px solid var(--accent); padding: 12px 20px; border-radius: 12px; box-shadow: 0 4px 20px var(--shadow-hover); z-index: 150; display: flex; align-items: center; gap: 12px; font-size: 13px;';
      hint.innerHTML = `
        <span style="color: var(--text-secondary);">Restore your data?</span>
        <button onclick="loadDatabaseFromFile()" class="primary" style="padding: 6px 14px; font-size: 13px;">Load dashboard-db.json</button>
        <button onclick="this.parentElement.remove()" style="padding: 6px 10px; font-size: 13px; color: var(--text-muted);">&times;</button>
      `;
      document.body.appendChild(hint);
    }

    async function loadDatabaseFromFile() {
      try {
        const [fileHandle] = await window.showOpenFilePicker({
          types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }]
        });
        dbFileHandle = fileHandle;

        const file = await fileHandle.getFile();
        const text = await file.text();
        const db = JSON.parse(text);

        // Restore Brain
        if (db.brain) {
          if (db.brain.categories) { lsSet('brain_categories', db.brain.categories); brainCategories = db.brain.categories; }
          if (db.brain.entries) { lsSet('brain_entries', db.brain.entries); brainEntries = db.brain.entries; }
          if (db.brain.activeCategory) { lsSet('brain_activeCategory', db.brain.activeCategory); brainActiveCategory = db.brain.activeCategory; }
        }

        // Restore Tasks cache
        if (db.tasks) {
          if (db.tasks.sections) { lsSet('dash_sections', db.tasks.sections); sections = db.tasks.sections; }
          if (db.tasks.tasks) { lsSet('dash_tasks', db.tasks.tasks); tasks = db.tasks.tasks; }
          if (db.tasks.fileName) { lsSet('dash_taskFileName', db.tasks.fileName); taskFileName = db.tasks.fileName; }
          if (db.tasks.view) { lsSet('dash_taskView', db.tasks.view); currentView = db.tasks.view; }
        }

        // Restore Memory Database
        if (db.memoryDb) {
          lsSet('dash_memoryDb', db.memoryDb);
          memoryDb = db.memoryDb;
        }

        // Restore preferences
        if (db.prefs) {
          if (db.prefs.theme) applyTheme(db.prefs.theme);
          if (db.prefs.activeTab) { lsSet('dash_activeTab', db.prefs.activeTab); activeMainTab = db.prefs.activeTab; }
        }

        // Re-render everything
        renderMemoryDb();
        switchMainTab(activeMainTab);
        if (sections.length > 0) {
          const boardEmptyState = document.getElementById('boardEmptyState');
          if (boardEmptyState) boardEmptyState.style.display = 'none';
          renderBoard();
          renderList();
          if (taskFileName) filePathEl.textContent = taskFileName;
        }
        renderBrain();

        // Remove hint
        const hint = document.getElementById('restoreHint');
        if (hint) hint.remove();

        showStatus('Restored from ' + DB_FILENAME);
      } catch (e) {
        if (e.name !== 'AbortError') showStatus('Error loading: ' + e.message);
      }
    }

    function buildDbSnapshot() {
      return {
        _version: 2,
        _saved: new Date().toISOString(),
        brain: {
          categories: brainCategories,
          entries: brainEntries,
          activeCategory: brainActiveCategory
        },
        tasks: {
          sections: sections,
          tasks: tasks,
          fileName: taskFileName,
          view: currentView
        },
        memoryDb: memoryDb,
        prefs: {
          theme: document.documentElement.getAttribute('data-theme') || 'light',
          activeTab: activeMainTab
        }
      };
    }

    async function saveDatabaseToFile() {
      if (!dbFileHandle) return;
      try {
        const writable = await dbFileHandle.createWritable();
        await writable.write(JSON.stringify(buildDbSnapshot(), null, 2));
        await writable.close();
      } catch (e) {
        console.log('DB save error:', e.message);
      }
    }

    // Debounced save — called whenever brain or tasks change
    function queueDbSave() {
      if (!dbFileHandle) return;
      if (dbSaveTimeout) clearTimeout(dbSaveTimeout);
      dbSaveTimeout = setTimeout(saveDatabaseToFile, 1000);
    }

    // Manual export — lets user pick where to save if no handle yet
    async function exportDatabase() {
      try {
        if (!dbFileHandle) {
          dbFileHandle = await window.showSaveFilePicker({
            suggestedName: DB_FILENAME,
            types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }]
          });
        }
        await saveDatabaseToFile();
        showStatus('Saved to ' + DB_FILENAME);
      } catch (e) {
        if (e.name !== 'AbortError') showStatus('Error: ' + e.message);
      }
    }

    window.loadDatabaseFromFile = loadDatabaseFromFile;
    window.exportDatabase = exportDatabase;

    // ===== DARK MODE =====
    const themeToggle = document.getElementById('themeToggle');
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      themeToggle.innerHTML = theme === 'dark' ? '&#9788;' : '&#9790;';
      lsSet('dash_theme', theme);
    }
    applyTheme(lsGet('dash_theme', 'light'));
    themeToggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme') || 'light';
      applyTheme(current === 'dark' ? 'light' : 'dark');
    });

    // ===== MAIN TAB SWITCHING =====
    const tasksTabBtn = document.getElementById('tasksTabBtn');
    const memoryTabBtn = document.getElementById('memoryTabBtn');
    const brainTabBtn = document.getElementById('brainTabBtn');
    const tasksPanel = document.getElementById('tasksPanel');
    const memoryPanel = document.getElementById('memoryPanel');
    const brainPanel = document.getElementById('brainPanel');
    const taskViewToggle = document.getElementById('taskViewToggle');
    const openTaskBtn = document.getElementById('openTaskBtn');
    const openMemoryBtn = document.getElementById('openMemoryBtn');
    const saveBtn = document.getElementById('saveBtn');

    function switchMainTab(tab) {
      activeMainTab = tab;
      lsSet('dash_activeTab', tab);

      tasksTabBtn.classList.toggle('active', tab === 'tasks');
      memoryTabBtn.classList.toggle('active', tab === 'memory');
      brainTabBtn.classList.toggle('active', tab === 'brain');

      tasksPanel.classList.toggle('active', tab === 'tasks');
      memoryPanel.classList.toggle('active', tab === 'memory');
      brainPanel.classList.toggle('active', tab === 'brain');

      // Show/hide view toggle for tasks
      taskViewToggle.style.display = tab === 'tasks' ? 'flex' : 'none';

      // Show/hide appropriate buttons
      openTaskBtn.style.display = tab === 'tasks' ? 'inline-flex' : 'none';
      openMemoryBtn.style.display = tab === 'memory' ? 'inline-flex' : 'none';
      saveBtn.style.display = tab === 'tasks' ? 'inline-flex' : 'none';

      // Update file path display
      if (tab === 'tasks') {
        filePathEl.textContent = taskFileHandle ? taskFileName : '';
      } else if (tab === 'memory') {
        filePathEl.textContent = memoryDirHandle ? memoryDirHandle.name : '';
      } else {
        filePathEl.textContent = 'Personal Knowledge Base';
      }

      if (tab === 'brain') renderBrain();
    }

    tasksTabBtn.addEventListener('click', () => switchMainTab('tasks'));
    memoryTabBtn.addEventListener('click', () => switchMainTab('memory'));
    brainTabBtn.addEventListener('click', () => switchMainTab('brain'));

    // ============================================================
    // ===== TASKS FUNCTIONALITY =====
    // ============================================================

    let taskFileHandle = null;
    let taskFileName = lsGet('dash_taskFileName', '');
    let sections = lsGet('dash_sections', []);
    let tasks = lsGet('dash_tasks', {});
    let hasChanges = false;
    let currentView = lsGet('dash_taskView', 'board');
    let quickAddSection = null;

    // Persist task data to localStorage on every change
    function persistTasks() {
      lsSet('dash_sections', sections);
      lsSet('dash_tasks', tasks);
      lsSet('dash_taskFileName', taskFileName);
      lsSet('dash_taskView', currentView);
      queueDbSave();
    }

    const board = document.getElementById('board');
    const listView = document.getElementById('listView');
    const listViewBtn = document.getElementById('listViewBtn');
    const boardViewBtn = document.getElementById('boardViewBtn');

    function taskSectionId(name) {
      return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    }

    function parseTaskMarkdown(content) {
      const resultSections = [];
      const resultTasks = {};
      let currentSection = null;
      let currentSectionId = null;

      const lines = content.split('\n');
      let currentTask = null;

      for (const line of lines) {
        const headerMatch = line.match(/^## \*{0,2}(.+?)\*{0,2}$/);
        if (headerMatch) {
          if (currentTask && currentSectionId) {
            resultTasks[currentSectionId].push(currentTask);
            currentTask = null;
          }

          const sectionName = headerMatch[1].trim();
          currentSectionId = taskSectionId(sectionName);
          currentSection = sectionName;

          if (!resultTasks[currentSectionId]) {
            resultSections.push({ id: currentSectionId, name: sectionName });
            resultTasks[currentSectionId] = [];
          }
        } else if (currentSectionId && line.match(/^- \[[ xX]\]/)) {
          if (currentTask) {
            resultTasks[currentSectionId].push(currentTask);
          }
          const checked = line.match(/\[[xX]\]/) !== null;
          let text = line.replace(/^- \[[ xX]\]\s*/, '');
          let title = text;
          let note = '';

          const boldMatch = text.match(/^\*\*(.+?)\*\*(.*)$/);
          if (boldMatch) {
            title = boldMatch[1];
            note = boldMatch[2].replace(/^\s*-\s*/, '').trim();
          }

          currentTask = {
            id: Date.now() + Math.random(),
            title,
            note,
            checked,
            subtasks: [],
            section: currentSectionId
          };
        } else if (currentTask && line.match(/^\s+- \[[ xX]\]/)) {
          const checked = line.match(/\[[xX]\]/) !== null;
          const text = line.replace(/^\s+- \[[ xX]\]\s*/, '');
          currentTask.subtasks.push({ text, checked });
        }
      }

      if (currentTask && currentSectionId) {
        resultTasks[currentSectionId].push(currentTask);
      }

      return { sections: resultSections, tasks: resultTasks };
    }

    function toMarkdown() {
      let md = '# Tasks\n';

      sections.forEach((section, idx) => {
        md += `\n## ${section.name}\n`;
        const sectionTasks = tasks[section.id] || [];
        sectionTasks.forEach(t => {
          const checkbox = t.checked ? '[x]' : '[ ]';
          const note = t.note ? ` - ${t.note}` : '';
          md += `- ${checkbox} **${t.title}**${note}\n`;
          t.subtasks.forEach(st => {
            const stCheckbox = st.checked ? '[x]' : '[ ]';
            md += `  - ${stCheckbox} ${st.text}\n`;
          });
        });
      });

      return md.trimEnd() + '\n';
    }

    function createCard(task) {
      const card = document.createElement('div');
      card.className = 'task-card';
      card.draggable = true;
      card.dataset.id = task.id;

      let html = `
        <div style="display: flex; align-items: flex-start; gap: 12px;">
          <button class="delete-btn" data-action="delete" title="Delete task">&times;</button>
          <span class="checkbox ${task.checked ? 'checked' : ''}" data-action="toggle"></span>
          <div class="card-title" data-action="edit-title">${task.title}</div>
        </div>
      `;

      if (task.note) {
        html += `<div class="card-note" data-action="edit-note" style="cursor: pointer; margin-left: 30px;">${task.note}</div>`;
      } else {
        html += `<div class="card-note add-on-hover" data-action="edit-note" style="cursor: pointer; margin-left: 30px; font-style: italic;">+ Add note</div>`;
      }

      if (task.subtasks.length > 0) {
        html += '<div class="card-subtasks" style="margin-left: 30px;">';
        task.subtasks.forEach((st, idx) => {
          html += `<div class="subtask">
            <span class="checkbox ${st.checked ? 'checked' : ''}" data-action="toggle-sub" data-idx="${idx}" style="width: 16px; height: 16px; min-width: 16px; min-height: 16px;"></span>
            <span data-action="edit-subtask" data-idx="${idx}" style="cursor: pointer;">${st.text}</span>
          </div>`;
        });
        html += `<div class="subtask add-on-hover" data-action="add-subtask" style="color: var(--text-muted); cursor: pointer; font-style: italic; padding-left: 24px;">+ Add subtask</div>`;
        html += '</div>';
      } else {
        html += `<div class="card-subtasks add-on-hover" style="margin-left: 30px;">
          <div class="subtask" data-action="add-subtask" style="color: var(--text-muted); cursor: pointer; font-style: italic;">+ Add subtask</div>
        </div>`;
      }

      card.innerHTML = html;

      card.addEventListener('dragstart', (e) => {
        card.classList.add('dragging');
        e.dataTransfer.setData('text/plain', task.id);
      });

      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
      });

      card.addEventListener('click', (e) => {
        const action = e.target.dataset.action;
        if (action === 'toggle') {
          task.checked = !task.checked;
          markChanged();
          renderTasks();
        } else if (action === 'toggle-sub') {
          const idx = parseInt(e.target.dataset.idx);
          task.subtasks[idx].checked = !task.subtasks[idx].checked;
          markChanged();
          renderTasks();
        } else if (action === 'edit-title') {
          startEditingTitle(e.target, task);
        } else if (action === 'edit-note') {
          startEditingNote(e.target, task);
        } else if (action === 'edit-subtask') {
          const idx = parseInt(e.target.dataset.idx);
          startEditingSubtask(e.target, task, idx);
        } else if (action === 'add-subtask') {
          startAddingSubtask(e.target, task);
        } else if (action === 'delete') {
          deleteTask(task);
        }
      });

      return card;
    }

    function startEditingTitle(titleEl, task) {
      const input = document.createElement('input');
      input.type = 'text';
      input.value = task.title;
      input.style.cssText = 'width: 100%; background: var(--bg-card); border: 2px solid var(--accent); border-radius: 6px; padding: 6px 10px; color: var(--text-primary); font-size: 14px; font-family: inherit; outline: none;';

      titleEl.replaceWith(input);
      input.focus();
      input.select();

      let saved = false;
      const saveEdit = () => {
        if (saved) return;
        saved = true;
        const newTitle = input.value.trim();
        if (newTitle && newTitle !== task.title) {
          task.title = newTitle;
          markChanged();
        }
        renderTasks();
      };

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); saveEdit(); }
        else if (e.key === 'Escape') { saved = true; renderTasks(); }
      });
      input.addEventListener('blur', saveEdit);
    }

    function startEditingNote(noteEl, task) {
      const input = document.createElement('input');
      input.type = 'text';
      input.value = task.note || '';
      input.placeholder = 'Add a note...';
      input.style.cssText = 'width: 100%; background: var(--bg-card); border: 2px solid var(--accent); border-radius: 6px; padding: 4px 8px; color: var(--text-primary); font-size: 13px; font-family: inherit; outline: none;';

      noteEl.replaceWith(input);
      input.focus();

      let saved = false;
      const saveEdit = () => {
        if (saved) return;
        saved = true;
        task.note = input.value.trim();
        markChanged();
        renderTasks();
      };

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); saveEdit(); }
        else if (e.key === 'Escape') { saved = true; renderTasks(); }
      });
      input.addEventListener('blur', saveEdit);
    }

    function startEditingSubtask(subtaskEl, task, idx) {
      const input = document.createElement('input');
      input.type = 'text';
      input.value = task.subtasks[idx].text;
      input.style.cssText = 'width: calc(100% - 30px); background: var(--bg-card); border: 2px solid var(--accent); border-radius: 4px; padding: 2px 6px; color: var(--text-primary); font-size: 13px; font-family: inherit; outline: none;';

      subtaskEl.replaceWith(input);
      input.focus();
      input.select();

      let saved = false;
      const saveEdit = () => {
        if (saved) return;
        saved = true;
        const newText = input.value.trim();
        if (newText) { task.subtasks[idx].text = newText; }
        else { task.subtasks.splice(idx, 1); }
        markChanged();
        renderTasks();
      };

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); saveEdit(); }
        else if (e.key === 'Escape') { saved = true; renderTasks(); }
      });
      input.addEventListener('blur', saveEdit);
    }

    function startAddingSubtask(el, task) {
      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = 'New subtask...';
      input.style.cssText = 'width: calc(100% - 10px); background: var(--bg-card); border: 2px solid var(--accent); border-radius: 4px; padding: 2px 6px; color: var(--text-primary); font-size: 13px; font-family: inherit; outline: none;';

      el.replaceWith(input);
      input.focus();

      let saved = false;
      const saveEdit = () => {
        if (saved) return;
        saved = true;
        const text = input.value.trim();
        if (text) { task.subtasks.push({ text, checked: false }); markChanged(); }
        renderTasks();
      };

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); saveEdit(); }
        else if (e.key === 'Escape') { saved = true; renderTasks(); }
      });
      input.addEventListener('blur', saveEdit);
    }

    function startEditingColumnTitle(titleEl, colId) {
      const section = sections.find(s => s.id === colId);
      if (!section) return;

      const input = document.createElement('input');
      input.type = 'text';
      input.value = section.name;
      input.style.cssText = 'width: 180px; background: var(--bg-card); border: 2px solid var(--accent); border-radius: 6px; padding: 4px 10px; color: var(--text-primary); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; font-family: inherit; outline: none;';

      titleEl.replaceWith(input);
      input.focus();
      input.select();

      let saved = false;
      const saveEdit = () => {
        if (saved) return;
        saved = true;
        const newName = input.value.trim();
        if (newName && newName !== section.name) {
          const oldId = section.id;
          section.name = newName;
          const newId = taskSectionId(newName);
          if (newId !== oldId) {
            tasks[newId] = tasks[oldId] || [];
            delete tasks[oldId];
            tasks[newId].forEach(t => t.section = newId);
            section.id = newId;
          }
          markChanged();
        }
        renderTasks();
      };

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); saveEdit(); }
        else if (e.key === 'Escape') { saved = true; renderTasks(); }
      });
      input.addEventListener('blur', saveEdit);
    }

    function createColumn(id, title, items) {
      const col = document.createElement('div');
      col.className = 'column';
      col.innerHTML = `
        <div class="column-header">
          <span class="column-title" data-section-id="${id}" style="cursor: pointer;">${title}</span>
          <span class="count">${items.length}</span>
          <button class="remove-section-btn" title="Remove section" style="margin-left: auto; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 15px; padding: 2px 6px; border-radius: 4px; line-height: 1; opacity: 0; transition: opacity 0.15s;" onmouseover="this.style.opacity=1;this.style.color='var(--accent)'" onmouseout="this.style.opacity=0;this.style.color='var(--text-muted)'">&times;</button>
        </div>
        <div class="cards" data-column="${id}"></div>
        <div class="add-card">
          <button data-add="${id}">+ Add task</button>
        </div>
      `;

      col.querySelector('.remove-section-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        removeSection(id);
      });

      col.querySelector('.column-title').addEventListener('click', (e) => {
        if (!col.dragging) { startEditingColumnTitle(e.target, id); }
      });

      const header = col.querySelector('.column-header');
      header.draggable = true;

      header.addEventListener('dragstart', (e) => {
        e.stopPropagation();
        col.classList.add('dragging-column');
        e.dataTransfer.setData('text/column', id);
        e.dataTransfer.effectAllowed = 'move';
      });

      header.addEventListener('dragend', () => {
        col.classList.remove('dragging-column');
        board.querySelectorAll('.column-drop-indicator').forEach(el => el.remove());
      });

      col.addEventListener('dragover', (e) => {
        if (e.dataTransfer.types.includes('text/column')) {
          e.preventDefault();
          e.stopPropagation();
          board.querySelectorAll('.column-drop-indicator').forEach(el => el.remove());
          const indicator = document.createElement('div');
          indicator.className = 'column-drop-indicator';
          const rect = col.getBoundingClientRect();
          if (e.clientX < rect.left + rect.width / 2) { col.before(indicator); }
          else { col.after(indicator); }
        }
      });

      col.addEventListener('drop', (e) => {
        if (e.dataTransfer.types.includes('text/column')) {
          e.preventDefault();
          e.stopPropagation();
          const fromId = e.dataTransfer.getData('text/column');
          const toId = id;
          if (fromId !== toId) {
            const rect = col.getBoundingClientRect();
            const insertBefore = e.clientX < rect.left + rect.width / 2;
            moveSection(fromId, toId, insertBefore);
          }
          board.querySelectorAll('.column-drop-indicator').forEach(el => el.remove());
        }
      });

      const cardsContainer = col.querySelector('.cards');
      items.forEach(task => { cardsContainer.appendChild(createCard(task)); });

      const getDropPosition = (e) => {
        const allCards = [...cardsContainer.querySelectorAll('.task-card')];
        const visibleCards = allCards.filter(c => !c.classList.contains('dragging'));
        let insertBeforeCard = null;
        let dropIndex = visibleCards.length;
        for (let i = 0; i < visibleCards.length; i++) {
          const rect = visibleCards[i].getBoundingClientRect();
          if (e.clientY < rect.top + rect.height / 2) {
            insertBeforeCard = visibleCards[i];
            dropIndex = i;
            break;
          }
        }
        return { insertBeforeCard, dropIndex };
      };

      const showDropIndicator = (e) => {
        col.querySelectorAll('.drop-indicator').forEach(el => el.remove());
        const { insertBeforeCard } = getDropPosition(e);
        const indicator = document.createElement('div');
        indicator.className = 'drop-indicator';
        indicator.style.cssText = 'height: 3px; background: var(--accent); border-radius: 2px; margin: 5px 0;';
        if (insertBeforeCard) { cardsContainer.insertBefore(indicator, insertBeforeCard); }
        else { cardsContainer.appendChild(indicator); }
      };

      col.addEventListener('dragover', (e) => {
        e.preventDefault();
        cardsContainer.classList.add('drag-over');
        showDropIndicator(e);
      });

      col.addEventListener('dragleave', (e) => {
        if (!col.contains(e.relatedTarget)) {
          cardsContainer.classList.remove('drag-over');
          col.querySelectorAll('.drop-indicator').forEach(el => el.remove());
        }
      });

      col.addEventListener('drop', (e) => {
        e.preventDefault();
        cardsContainer.classList.remove('drag-over');
        col.querySelectorAll('.drop-indicator').forEach(el => el.remove());
        const taskId = parseFloat(e.dataTransfer.getData('text/plain'));
        const { dropIndex } = getDropPosition(e);
        moveTask(taskId, id, dropIndex);
      });

      col.querySelector(`[data-add="${id}"]`).addEventListener('click', () => {
        addNewTask(id, col.querySelector('.cards'));
      });

      return col;
    }

    function addNewTask(sectionId, container) {
      const existing = container.querySelector('.new-task-input');
      if (existing) return;

      const input = document.createElement('textarea');
      input.className = 'new-task-input';
      input.placeholder = 'What needs to be done?';
      input.rows = 2;
      container.appendChild(input);
      input.focus();

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          const title = input.value.trim();
          if (title) {
            if (!tasks[sectionId]) tasks[sectionId] = [];
            tasks[sectionId].push({
              id: Date.now() + Math.random(),
              title,
              note: '',
              checked: false,
              subtasks: [],
              section: sectionId
            });
            markChanged();
            renderTasks();
          } else { input.remove(); }
        } else if (e.key === 'Escape') { input.remove(); }
      });

      input.addEventListener('blur', () => { setTimeout(() => input.remove(), 100); });
    }

    function moveSection(fromId, toId, insertBefore) {
      const fromIdx = sections.findIndex(s => s.id === fromId);
      const toIdx = sections.findIndex(s => s.id === toId);
      if (fromIdx === -1 || toIdx === -1) return;
      const [section] = sections.splice(fromIdx, 1);
      let newIdx = sections.findIndex(s => s.id === toId);
      if (!insertBefore) newIdx++;
      sections.splice(newIdx, 0, section);
      markChanged();
      renderTasks();
    }

    function moveTask(taskId, toSectionId, dropIndex = -1) {
      let task = null;
      for (const section of sections) {
        const sectionTasks = tasks[section.id] || [];
        const idx = sectionTasks.findIndex(t => t.id === taskId);
        if (idx !== -1) {
          task = sectionTasks.splice(idx, 1)[0];
          break;
        }
      }
      if (!task) return;
      task.section = toSectionId;
      if (!tasks[toSectionId]) tasks[toSectionId] = [];
      if (dropIndex >= 0 && dropIndex <= tasks[toSectionId].length) {
        tasks[toSectionId].splice(dropIndex, 0, task);
      } else {
        tasks[toSectionId].push(task);
      }
      markChanged();
      renderTasks();
    }

    function deleteTask(task) {
      if (!confirm(`Delete "${task.title}"?`)) return;
      for (const section of sections) {
        const sectionTasks = tasks[section.id] || [];
        const idx = sectionTasks.findIndex(t => t.id === task.id);
        if (idx !== -1) { sectionTasks.splice(idx, 1); break; }
      }
      markChanged();
      renderTasks();
    }

    function removeSection(sectionId) {
      const section = sections.find(s => s.id === sectionId);
      if (!section) return;
      const count = (tasks[sectionId] || []).length;
      const msg = count > 0
        ? `Remove "${section.name}" and its ${count} task${count > 1 ? 's' : ''}?`
        : `Remove empty section "${section.name}"?`;
      if (!confirm(msg)) return;
      sections = sections.filter(s => s.id !== sectionId);
      delete tasks[sectionId];
      markChanged();
      renderTasks();
    }

    let saveTimeout = null;
    let lastModified = 0;
    let watchInterval = null;
    let isSaving = false;

    function markChanged() {
      hasChanges = true;
      saveBtn.disabled = false;
      persistTasks();
      if (saveTimeout) clearTimeout(saveTimeout);
      saveTimeout = setTimeout(autoSave, 500);
    }

    async function autoSave() {
      if (!taskFileHandle || !hasChanges || isSaving) return;
      isSaving = true;
      try {
        const writable = await taskFileHandle.createWritable();
        const content = toMarkdown();
        await writable.write(content);
        await writable.close();
        const file = await taskFileHandle.getFile();
        lastModified = file.lastModified;
        hasChanges = false;
        saveBtn.disabled = true;
        showStatus('Saved');
      } catch (e) {
        showStatus('Save failed: ' + e.message);
      }
      isSaving = false;
    }

    async function checkForExternalChanges() {
      if (!taskFileHandle || hasChanges || isSaving) return;
      try {
        const file = await taskFileHandle.getFile();
        if (file.lastModified > lastModified) {
          lastModified = file.lastModified;
          const content = await file.text();
          const result = parseTaskMarkdown(content);
          sections = result.sections;
          tasks = result.tasks;
          renderTasks();
          showStatus('Reloaded');
        }
      } catch (e) { console.log('Watch error:', e); }
    }

    function startWatching() {
      if (watchInterval) clearInterval(watchInterval);
      watchInterval = setInterval(checkForExternalChanges, 1000);
    }

    function stopWatching() {
      if (watchInterval) { clearInterval(watchInterval); watchInterval = null; }
    }

    function renderTasks() {
      if (currentView === 'board') { renderBoard(); }
      else { renderList(); }
    }

    function renderBoard() {
      board.innerHTML = '';
      sections.forEach(section => {
        const sectionTasks = tasks[section.id] || [];
        board.appendChild(createColumn(section.id, section.name, sectionTasks));
      });

      const addSectionBtn = document.createElement('div');
      addSectionBtn.className = 'column';
      addSectionBtn.style.cssText = 'background: transparent; border: 2px dashed var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; min-height: 120px;';
      addSectionBtn.innerHTML = '<span style="color: var(--text-muted); font-size: 14px; font-weight: 500;">+ Add Section</span>';
      addSectionBtn.addEventListener('click', () => startAddingSection(addSectionBtn));
      board.appendChild(addSectionBtn);
    }

    function renderList() {
      listView.innerHTML = '';

      if (!quickAddSection && sections.length > 0) {
        quickAddSection = sections[0].id;
      }

      // Quick add at top
      const quickAdd = document.createElement('div');
      quickAdd.className = 'quick-add';
      quickAdd.style.cssText = 'border-bottom: 2px solid var(--border); margin-bottom: 24px; padding-bottom: 16px;';

      const sectionName = sections.find(s => s.id === quickAddSection)?.name || 'Select section';
      quickAdd.innerHTML = `
        <span class="checkbox" style="opacity: 0.3;"></span>
        <input type="text" class="quick-add-input" placeholder="Add a task..." id="quickAddInput">
        <span class="quick-add-section" id="quickAddSectionBtn">${sectionName}</span>
      `;
      listView.appendChild(quickAdd);

      const quickInput = document.getElementById('quickAddInput');
      const sectionBtn = document.getElementById('quickAddSectionBtn');

      quickInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && quickInput.value.trim()) {
          const title = quickInput.value.trim();
          if (!tasks[quickAddSection]) tasks[quickAddSection] = [];
          tasks[quickAddSection].unshift({
            id: Date.now() + Math.random(),
            title,
            note: '',
            checked: false,
            subtasks: [],
            section: quickAddSection
          });
          quickInput.value = '';
          markChanged();
          renderTasks();
          setTimeout(() => document.getElementById('quickAddInput')?.focus(), 10);
        }
      });

      sectionBtn.addEventListener('click', (e) => { showSectionPicker(e.target); });

      // Render each section
      sections.forEach(section => {
        const sectionTasks = tasks[section.id] || [];
        const sectionEl = document.createElement('div');
        sectionEl.className = 'list-section';
        sectionEl.dataset.sectionId = section.id;

        const header = document.createElement('div');
        header.className = 'list-section-header';
        header.innerHTML = `
          <span class="section-title" data-section-id="${section.id}">${section.name}</span>
          <span class="count">${sectionTasks.length}</span>
