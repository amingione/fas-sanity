          <button class="remove-section-btn" title="Remove section" style="margin-left: auto; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 15px; padding: 2px 6px; border-radius: 4px; line-height: 1; opacity: 0; transition: opacity 0.15s;">&times;</button>
        `;

        header.querySelector('.remove-section-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          removeSection(section.id);
        });

        header.addEventListener('mouseenter', () => { header.querySelector('.remove-section-btn').style.opacity = '0.5'; });
        header.addEventListener('mouseleave', () => { header.querySelector('.remove-section-btn').style.opacity = '0'; });

        header.querySelector('.section-title').addEventListener('click', (e) => {
          startEditingListSectionTitle(e.target, section);
        });

        sectionEl.appendChild(header);

        const tasksContainer = document.createElement('div');
        tasksContainer.className = 'list-tasks-container';
        tasksContainer.dataset.sectionId = section.id;

        sectionTasks.forEach(task => {
          tasksContainer.appendChild(createListItem(task, section));
        });

        sectionEl.appendChild(tasksContainer);

        // Drag-and-drop handlers for section
        const getDropPosition = (e, container) => {
          const items = [...container.querySelectorAll('.list-item:not(.dragging)')];
          let insertBeforeEl = null;
          let dropIndex = items.length;
          for (let i = 0; i < items.length; i++) {
            const rect = items[i].getBoundingClientRect();
            if (e.clientY < rect.top + rect.height / 2) {
              insertBeforeEl = items[i];
              dropIndex = i;
              break;
            }
          }
          return { insertBeforeEl, dropIndex };
        };

        const showDropIndicator = (e) => {
          tasksContainer.querySelectorAll('.list-drop-indicator').forEach(el => el.remove());
          const { insertBeforeEl } = getDropPosition(e, tasksContainer);
          const indicator = document.createElement('div');
          indicator.className = 'list-drop-indicator';
          if (insertBeforeEl) { tasksContainer.insertBefore(indicator, insertBeforeEl); }
          else { tasksContainer.appendChild(indicator); }
        };

        sectionEl.addEventListener('dragover', (e) => {
          e.preventDefault();
          sectionEl.classList.add('drag-over');
          showDropIndicator(e);
        });

        sectionEl.addEventListener('dragleave', (e) => {
          if (!sectionEl.contains(e.relatedTarget)) {
            sectionEl.classList.remove('drag-over');
            tasksContainer.querySelectorAll('.list-drop-indicator').forEach(el => el.remove());
          }
        });

        sectionEl.addEventListener('drop', (e) => {
          e.preventDefault();
          sectionEl.classList.remove('drag-over');
          tasksContainer.querySelectorAll('.list-drop-indicator').forEach(el => el.remove());
          const taskId = parseFloat(e.dataTransfer.getData('text/plain'));
          if (!taskId) return;
          const { dropIndex } = getDropPosition(e, tasksContainer);
          moveTask(taskId, section.id, dropIndex);
        });

        listView.appendChild(sectionEl);
      });

      // Add Section button
      const addSectionBtn = document.createElement('div');
      addSectionBtn.className = 'list-add-section';
      addSectionBtn.textContent = '+ Add Section';
      addSectionBtn.addEventListener('click', () => { startAddingListSection(addSectionBtn); });
      listView.appendChild(addSectionBtn);
    }

    function startEditingListSectionTitle(titleEl, section) {
      const input = document.createElement('input');
      input.type = 'text';
      input.value = section.name;
      input.style.cssText = 'width: 200px; background: var(--bg-card); border: 2px solid var(--accent); border-radius: 6px; padding: 4px 10px; color: var(--text-primary); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; font-family: inherit; outline: none;';

      titleEl.replaceWith(input);
      input.focus();
      input.select();

      let saved = false;
      const saveEdit = () => {
        if (saved) return;
        saved = true;
        const newName = input.value.trim();
        if (newName && newName !== section.name) {
          const oldId = section.id;
          section.name = newName;
          const newId = taskSectionId(newName);
          if (newId !== oldId) {
            tasks[newId] = tasks[oldId] || [];
            delete tasks[oldId];
            tasks[newId].forEach(t => t.section = newId);
            section.id = newId;
          }
          markChanged();
        }
        renderTasks();
      };

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); saveEdit(); }
        else if (e.key === 'Escape') { saved = true; renderTasks(); }
      });
      input.addEventListener('blur', saveEdit);
    }

    function startAddingListSection(btn) {
      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = 'Section name...';
      input.style.cssText = 'width: 100%; background: var(--bg-card); border: 2px solid var(--accent); border-radius: 8px; padding: 12px 16px; color: var(--text-primary); font-size: 14px; font-family: inherit; outline: none; text-align: left;';

      btn.innerHTML = '';
      btn.style.border = '2px solid var(--accent)';
      btn.style.cursor = 'default';
      btn.appendChild(input);
      input.focus();

      let saved = false;
      const saveSection = () => {
        if (saved) return;
        saved = true;
        const name = input.value.trim();
        if (name) {
          const id = taskSectionId(name);
          if (!tasks[id]) {
            sections.push({ id, name });
            tasks[id] = [];
            markChanged();
          }
        }
        renderTasks();
      };

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); saveSection(); }
        else if (e.key === 'Escape') { saved = true; renderTasks(); }
      });
      input.addEventListener('blur', saveSection);
    }

    function createListItem(task, section) {
      const item = document.createElement('div');
      item.className = 'list-item';
      item.draggable = true;
      item.dataset.taskId = task.id;

      item.addEventListener('dragstart', (e) => {
        item.classList.add('dragging');
        e.dataTransfer.setData('text/plain', task.id);
        e.dataTransfer.effectAllowed = 'move';
      });

      item.addEventListener('dragend', () => {
        item.classList.remove('dragging');
        document.querySelectorAll('.list-drop-indicator').forEach(el => el.remove());
        document.querySelectorAll('.list-section.drag-over').forEach(el => el.classList.remove('drag-over'));
      });

      const checkbox = document.createElement('span');
      checkbox.className = `checkbox ${task.checked ? 'checked' : ''}`;
      checkbox.addEventListener('click', (e) => {
        e.stopPropagation();
        task.checked = !task.checked;
        markChanged();
        renderTasks();
      });

      const content = document.createElement('div');
      content.className = 'list-item-content';

      const title = document.createElement('div');
      title.className = `list-item-title ${task.checked ? 'checked' : ''}`;
      title.textContent = task.title;
      title.addEventListener('click', (e) => {
        e.stopPropagation();
        startEditingListItem(title, task);
      });
      content.appendChild(title);

      if (task.note) {
        const note = document.createElement('div');
        note.className = 'list-item-note';
        note.textContent = task.note;
        note.addEventListener('click', (e) => {
          e.stopPropagation();
          startEditingListNote(note, task);
        });
        content.appendChild(note);
      } else {
        const addNote = document.createElement('div');
        addNote.className = 'list-item-note add-note';
        addNote.textContent = '+ Add note';
        addNote.addEventListener('click', (e) => {
          e.stopPropagation();
          startEditingListNote(addNote, task);
        });
        content.appendChild(addNote);
      }

      if (task.subtasks && task.subtasks.length > 0) {
        const subtasksContainer = document.createElement('div');
        subtasksContainer.className = 'list-item-subtasks';

        task.subtasks.forEach((st, idx) => {
          const subtaskEl = document.createElement('div');
          subtaskEl.className = 'list-item-subtask';

          const stCheckbox = document.createElement('span');
          stCheckbox.className = `checkbox ${st.checked ? 'checked' : ''}`;
          stCheckbox.addEventListener('click', (e) => {
            e.stopPropagation();
            st.checked = !st.checked;
            markChanged();
            renderTasks();
          });

          const stText = document.createElement('span');
          stText.textContent = st.text;
          if (st.checked) {
            stText.style.textDecoration = 'line-through';
            stText.style.color = 'var(--text-muted)';
          }
          stText.addEventListener('click', (e) => {
            e.stopPropagation();
            startEditingListSubtask(stText, task, idx);
          });

          subtaskEl.appendChild(stCheckbox);
          subtaskEl.appendChild(stText);
          subtasksContainer.appendChild(subtaskEl);
        });

        content.appendChild(subtasksContainer);
      }

      const addSubtask = document.createElement('div');
      addSubtask.className = 'list-item-add-subtask';
      addSubtask.textContent = '+ Add subtask';
      addSubtask.addEventListener('click', (e) => {
        e.stopPropagation();
        startAddingListSubtask(addSubtask, task);
      });
      content.appendChild(addSubtask);

      const actions = document.createElement('div');
      actions.className = 'list-item-actions';
      actions.innerHTML = '<button title="Delete task">&times;</button>';
      actions.querySelector('button').addEventListener('click', (e) => {
        e.stopPropagation();
        deleteTask(task);
      });

      item.appendChild(checkbox);
      item.appendChild(content);
      item.appendChild(actions);

      return item;
    }

    function startEditingListNote(noteEl, task) {
      const input = document.createElement('input');
      input.type = 'text';
      input.value = task.note || '';
      input.placeholder = 'Add a note...';
      input.style.cssText = 'width: 100%; background: var(--bg-card); border: 2px solid var(--accent); border-radius: 6px; padding: 4px 8px; color: var(--text-primary); font-size: 13px; font-family: inherit; outline: none;';

      noteEl.replaceWith(input);
      input.focus();

      let saved = false;
      const saveEdit = () => {
        if (saved) return;
        saved = true;
        task.note = input.value.trim();
        markChanged();
        renderTasks();
      };

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); saveEdit(); }
        else if (e.key === 'Escape') { saved = true; renderTasks(); }
      });
      input.addEventListener('blur', saveEdit);
    }

    function startEditingListSubtask(subtaskEl, task, idx) {
      const input = document.createElement('input');
      input.type = 'text';
      input.value = task.subtasks[idx].text;
      input.style.cssText = 'width: calc(100% - 30px); background: var(--bg-card); border: 2px solid var(--accent); border-radius: 4px; padding: 2px 6px; color: var(--text-primary); font-size: 13px; font-family: inherit; outline: none;';

      subtaskEl.replaceWith(input);
      input.focus();
      input.select();

      let saved = false;
      const saveEdit = () => {
        if (saved) return;
        saved = true;
        const newText = input.value.trim();
        if (newText) { task.subtasks[idx].text = newText; }
        else { task.subtasks.splice(idx, 1); }
        markChanged();
        renderTasks();
      };

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); saveEdit(); }
        else if (e.key === 'Escape') { saved = true; renderTasks(); }
      });
      input.addEventListener('blur', saveEdit);
    }

    function startAddingListSubtask(el, task) {
      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = 'New subtask...';
      input.style.cssText = 'width: calc(100% - 10px); background: var(--bg-card); border: 2px solid var(--accent); border-radius: 4px; padding: 2px 6px; color: var(--text-primary); font-size: 13px; font-family: inherit; outline: none;';

      el.replaceWith(input);
      input.focus();

      let saved = false;
      const saveEdit = () => {
        if (saved) return;
        saved = true;
        const text = input.value.trim();
        if (text) {
          if (!task.subtasks) task.subtasks = [];
          task.subtasks.push({ text, checked: false });
          markChanged();
        }
        renderTasks();
      };

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); saveEdit(); }
        else if (e.key === 'Escape') { saved = true; renderTasks(); }
      });
      input.addEventListener('blur', saveEdit);
    }

    function startEditingListItem(titleEl, task) {
      const input = document.createElement('input');
      input.type = 'text';
      input.value = task.title;
      input.style.cssText = 'width: 100%; background: var(--bg-card); border: 2px solid var(--accent); border-radius: 6px; padding: 8px 12px; color: var(--text-primary); font-size: 15px; font-family: inherit; outline: none;';

      titleEl.replaceWith(input);
      input.focus();
      input.select();

      let saved = false;
      const saveEdit = () => {
        if (saved) return;
        saved = true;
        const newTitle = input.value.trim();
        if (newTitle && newTitle !== task.title) {
          task.title = newTitle;
          markChanged();
        }
        renderTasks();
      };

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); saveEdit(); }
        else if (e.key === 'Escape') { saved = true; renderTasks(); }
      });
      input.addEventListener('blur', saveEdit);
    }

    function showSectionPicker(anchorEl) {
      document.querySelectorAll('.section-picker').forEach(el => el.remove());
      const picker = document.createElement('div');
      picker.className = 'section-picker';
      const rect = anchorEl.getBoundingClientRect();
      picker.style.top = (rect.bottom + 4) + 'px';
      picker.style.right = (window.innerWidth - rect.right) + 'px';

      sections.forEach(section => {
        const btn = document.createElement('button');
        btn.textContent = section.name;
        btn.addEventListener('click', () => {
          quickAddSection = section.id;
          picker.remove();
          renderTasks();
          setTimeout(() => document.getElementById('quickAddInput')?.focus(), 10);
        });
        picker.appendChild(btn);
      });

      document.body.appendChild(picker);
      setTimeout(() => {
        document.addEventListener('click', function closeHandler(e) {
          if (!picker.contains(e.target)) {
            picker.remove();
            document.removeEventListener('click', closeHandler);
          }
        });
      }, 10);
    }

    function switchTaskView(view) {
      currentView = view;
      lsSet('dash_taskView', view);
      if (view === 'list') {
        listView.style.display = 'block';
        board.style.display = 'none';
        listViewBtn.classList.add('active');
        boardViewBtn.classList.remove('active');
      } else {
        listView.style.display = 'none';
        board.style.display = 'flex';
        listViewBtn.classList.remove('active');
        boardViewBtn.classList.add('active');
      }
      renderTasks();
    }

    listViewBtn.addEventListener('click', () => switchTaskView('list'));
    boardViewBtn.addEventListener('click', () => switchTaskView('board'));

    function startAddingSection(btn) {
      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = 'Section name...';
      input.style.cssText = 'width: 220px; background: var(--bg-card); border: 2px solid var(--accent); border-radius: 8px; padding: 10px 14px; color: var(--text-primary); font-size: 14px; font-family: inherit; outline: none;';

      btn.innerHTML = '';
      btn.style.cssText = 'background: var(--bg-secondary); border: 2px dashed var(--accent); display: flex; align-items: center; justify-content: center; cursor: default; min-height: 120px; min-width: 340px; border-radius: 12px;';
      btn.appendChild(input);
      input.focus();

      let saved = false;
      const saveSection = () => {
        if (saved) return;
        saved = true;
        const name = input.value.trim();
        if (name) {
          const id = taskSectionId(name);
          if (!tasks[id]) {
            sections.push({ id, name });
            tasks[id] = [];
            markChanged();
          }
        }
        renderTasks();
      };

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); saveSection(); }
        else if (e.key === 'Escape') { saved = true; renderTasks(); }
      });
      input.addEventListener('blur', saveSection);
    }

    async function openTaskFile() {
      try {
        [taskFileHandle] = await window.showOpenFilePicker({
          types: [{ description: 'Markdown', accept: { 'text/markdown': ['.md'] } }]
        });
        const file = await taskFileHandle.getFile();
        const content = await file.text();
        lastModified = file.lastModified;
        const result = parseTaskMarkdown(content);
        sections = result.sections;
        tasks = result.tasks;
        persistTasks();
        switchTaskView('board');
        startWatching();
        taskFileName = file.name;
        filePathEl.textContent = file.name;
        showStatus('Loaded ' + file.name);
      } catch (e) {
        if (e.name !== 'AbortError') { showStatus('Error: ' + e.message); }
      }
    }

    openTaskBtn.addEventListener('click', openTaskFile);
    document.getElementById('openBtnLarge')?.addEventListener('click', openTaskFile);

    saveBtn.addEventListener('click', async () => {
      if (!taskFileHandle) return;
      try {
        const writable = await taskFileHandle.createWritable();
        await writable.write(toMarkdown());
        await writable.close();
        hasChanges = false;
        saveBtn.disabled = true;
        showStatus('Saved');
      } catch (e) { showStatus('Error: ' + e.message); }
    });

    window.addEventListener('beforeunload', (e) => {
      if (hasChanges) { e.preventDefault(); e.returnValue = ''; }
    });

    // ============================================================
    // ===== MEMORY FUNCTIONALITY =====
    // ============================================================

    let memoryDirHandle = null;
    let memoryData = {
      claudeMd: null,
      memoryFiles: [],
      memoryDirs: {}
    };

    // Memory browse-view elements
    const memoryBrowseView = document.getElementById('memoryBrowseView');
    const memoryTabsContainer = document.getElementById('memoryTabsContainer');
    const memoryContentContainer = document.getElementById('memoryContentContainer');
    const modalOverlay = document.getElementById('modalOverlay');

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    function parseMemoryMarkdown(content) {
      const parsed = {
        title: '',
        fields: {},
        sections: {},
        tables: [],
        rawContent: content
      };

      const lines = content.split('\n');
      let currentSection = '_intro';
      parsed.sections[currentSection] = [];

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        if (line.match(/^# /)) {
          parsed.title = line.replace(/^# /, '').trim();
          continue;
        }

        if (line.match(/^## /)) {
          currentSection = line.replace(/^## /, '').trim();
          parsed.sections[currentSection] = [];
          continue;
        }

        const kvMatch = line.match(/^\*\*(.+?):\*\*\s*(.*)$/);
        if (kvMatch) {
          parsed.fields[kvMatch[1]] = kvMatch[2];
          continue;
        }

        parsed.sections[currentSection].push(line);
      }

      for (const key in parsed.sections) {
        parsed.sections[key] = parsed.sections[key].join('\n').trim();
      }

      const tableRegex = /\|(.+)\|\n\|[-| ]+\|\n((?:\|.+\|\n?)+)/g;
      let match;
      while ((match = tableRegex.exec(content)) !== null) {
        const headers = match[1].split('|').map(h => h.trim()).filter(h => h);
        const rowLines = match[2].trim().split('\n');
        const rows = rowLines.map(row => row.split('|').map(c => c.trim()).filter(c => c));
        parsed.tables.push({ headers, rows });
      }

      return parsed;
    }

    function getPreview(content, maxLength = 150) {
      let preview = content
        .replace(/^#+ .+$/gm, '')
        .replace(/\*\*(.+?):\*\*.*/g, '')
        .replace(/\|.+\|/g, '')
        .replace(/[-=]{3,}/g, '')
        .trim()
        .substring(0, maxLength);
      if (content.length > maxLength) preview += '...';
      return preview;
    }

    function getDisplayName(filename) {
      return filename
        .replace('.md', '')
        .split(/[-_]/)
        .map(w => w.charAt(0).toUpperCase() + w.slice(1))
        .join(' ');
    }

    async function loadMemoryDirectory() {
      try {
        memoryDirHandle = await window.showDirectoryPicker();

        memoryData = { claudeMd: null, memoryFiles: [], memoryDirs: {} };

        // Try CLAUDE.md first (for .claude project folders)
        try {
          const claudeFileHandle = await memoryDirHandle.getFileHandle('CLAUDE.md');
          const file = await claudeFileHandle.getFile();
          memoryData.claudeMd = { content: await file.text(), fileHandle: claudeFileHandle };
        } catch (e) { /* No CLAUDE.md — that's fine */ }

        // Try memory/ subfolder (for .claude project folders)
        try {
          const memoryDir = await memoryDirHandle.getDirectoryHandle('memory');
          for await (const entry of memoryDir.values()) {
            if (entry.kind === 'file' && entry.name.endsWith('.md')) {
              const file = await entry.getFile();
              memoryData.memoryFiles.push({
                name: entry.name,
                content: await file.text(),
                fileHandle: entry
              });
            } else if (entry.kind === 'directory') {
              memoryData.memoryDirs[entry.name] = [];
              const subDirHandle = entry;
              for await (const subEntry of subDirHandle.values()) {
                if (subEntry.kind === 'file' && subEntry.name.endsWith('.md')) {
                  const file = await subEntry.getFile();
                  const content = await file.text();
                  memoryData.memoryDirs[entry.name].push({
                    name: subEntry.name,
                    content: content,
                    fileHandle: subEntry,
                    dirHandle: subDirHandle,
                    parsed: parseMemoryMarkdown(content)
                  });
                }
              }
            }
          }
        } catch (e) { /* No memory/ directory — that's fine */ }

        // FALLBACK: If nothing was found via .claude structure, scan the
        // root folder for ALL .md files and subdirectories with .md files
        const foundAnything = memoryData.claudeMd || memoryData.memoryFiles.length > 0 || Object.keys(memoryData.memoryDirs).length > 0;

        if (!foundAnything) {
          for await (const entry of memoryDirHandle.values()) {
            if (entry.kind === 'file' && entry.name.endsWith('.md')) {
              const file = await entry.getFile();
              memoryData.memoryFiles.push({
                name: entry.name,
                content: await file.text(),
                fileHandle: entry
              });
            } else if (entry.kind === 'directory' && !entry.name.startsWith('.') && entry.name !== 'node_modules') {
              const subFiles = [];
              const subDirHandle = entry;
              try {
                for await (const subEntry of subDirHandle.values()) {
                  if (subEntry.kind === 'file' && subEntry.name.endsWith('.md')) {
                    const file = await subEntry.getFile();
                    const content = await file.text();
                    subFiles.push({
                      name: subEntry.name,
                      content: content,
                      fileHandle: subEntry,
                      dirHandle: subDirHandle,
                      parsed: parseMemoryMarkdown(content)
                    });
                  }
                }
              } catch (e) { /* skip inaccessible dirs */ }
              if (subFiles.length > 0) {
                memoryData.memoryDirs[entry.name] = subFiles;
              }
            }
          }

          // If we found root .md files but no CLAUDE.md, use the first one as overview
          if (memoryData.memoryFiles.length > 0 && !memoryData.claudeMd) {
            const readmeFile = memoryData.memoryFiles.find(f => f.name.toLowerCase() === 'readme.md');
            if (readmeFile) {
              memoryData.claudeMd = { content: readmeFile.content, fileHandle: readmeFile.fileHandle };
              memoryData.memoryFiles = memoryData.memoryFiles.filter(f => f !== readmeFile);
            }
          }
        }

        renderMemory();
        // Index files into the persistent database
        indexMemoryToDb();
        // Switch to browse view to show the loaded folder
        switchMemoryView('browse');
        filePathEl.textContent = memoryDirHandle.name;

        const totalFiles = memoryData.memoryFiles.length + Object.values(memoryData.memoryDirs).reduce((s, f) => s + f.length, 0) + (memoryData.claudeMd ? 1 : 0);
        showStatus(`Loaded ${totalFiles} file${totalFiles !== 1 ? 's' : ''} from ${memoryDirHandle.name}`);

      } catch (e) {
        if (e.name !== 'AbortError') { showStatus('Error: ' + e.message); }
      }
    }

    function renderMemory() {
      renderMemoryTabs();
      renderMemoryContent();
    }

    function renderMemoryTabs() {
      let html = '';

      if (memoryData.claudeMd) {
        html += `<button class="memory-tab active" data-tab="overview">Overview</button>`;
      } else {
        // Show "All Files" tab when no CLAUDE.md structure
        const totalFiles = memoryData.memoryFiles.length + Object.values(memoryData.memoryDirs).reduce((s, f) => s + f.length, 0);
        html += `<button class="memory-tab active" data-tab="allfiles">All Files <span class="count">${totalFiles}</span></button>`;
      }

      for (const file of memoryData.memoryFiles) {
        const name = file.name.replace('.md', '');
        html += `<button class="memory-tab" data-tab="file-${name}">${name}</button>`;
      }

      for (const dirName of Object.keys(memoryData.memoryDirs).sort()) {
        const files = memoryData.memoryDirs[dirName];
        let count;
        if (dirName === 'context') {
          count = 0;
          for (const file of files) {
            const p = file.parsed;
            count += Object.keys(p.fields).length;
            for (const table of p.tables) {
              count += table.rows.length;
            }
            for (const [sName, sContent] of Object.entries(p.sections)) {
              if (sContent && sName !== '_intro') {
                count += sContent.split('\n').filter(l => l.trim() && !l.trim().startsWith('|')).length;
              }
            }
          }
        } else {
          count = files.length;
        }
        html += `<button class="memory-tab" data-tab="dir-${dirName}">${dirName} <span class="count">${count}</span></button>`;
      }

      memoryTabsContainer.innerHTML = html;

      memoryTabsContainer.querySelectorAll('.memory-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          memoryTabsContainer.querySelectorAll('.memory-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          renderMemoryContent();
        });
      });
    }

    function renderMemoryContent() {
      const activeTab = memoryTabsContainer.querySelector('.memory-tab.active');
      if (!activeTab) return;

      const tabId = activeTab.dataset.tab;

      if (tabId === 'overview') { renderMemoryOverview(); }
      else if (tabId === 'allfiles') { renderAllFiles(); }
      else if (tabId.startsWith('file-')) {
        const fileName = tabId.replace('file-', '') + '.md';
        renderMemoryFile(fileName);
      } else if (tabId.startsWith('dir-')) {
        const dirName = tabId.replace('dir-', '');
        renderMemoryDirectory(dirName);
      }
    }

    function renderAllFiles() {
      // Check if any files have importable tasks
      let anyTasks = false;
      const allFileTaskInfo = new Map();

      for (const file of memoryData.memoryFiles) {
        const info = detectTaskContent(file.content);
        allFileTaskInfo.set(file.name, info);
        if (info.hasTaskContent) anyTasks = true;
      }
      for (const [dirName, files] of Object.entries(memoryData.memoryDirs)) {
        for (const file of files) {
          const info = detectTaskContent(file.content);
          allFileTaskInfo.set(dirName + '/' + file.name, info);
          if (info.hasTaskContent) anyTasks = true;
        }
      }

      let html = '';

      // Show "Import All Tasks" banner if any file has tasks
      if (anyTasks) {
        html += `
          <div style="display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: var(--bg-secondary); border: 1px solid var(--accent); border-radius: 10px; margin-bottom: 12px;">
            <span style="font-size: 13px; color: var(--text-primary);">📋 Some files contain trackable tasks</span>
            <button class="primary" onclick="importAllMemoryTasks()" style="margin-left: auto; font-size: 13px; white-space: nowrap;">
              → Import All to Tasks
            </button>
          </div>
        `;
      }

      html += '<div class="memory-grid" id="dirGrid">';

      // Root-level .md files
      for (const file of memoryData.memoryFiles) {
        const preview = getPreview(file.content, 120);
        const displayName = getDisplayName(file.name);
        const info = allFileTaskInfo.get(file.name);
        const taskBadge = info && info.hasTaskContent
          ? `<div style="display: flex; align-items: center; gap: 6px; margin-top: 6px; font-size: 11px; color: var(--accent); font-weight: 500;">📋 ${info.checkedCount}/${info.checkboxCount} tasks</div>`
          : '';

        html += `
          <div class="memory-card" onclick="switchToFileTab('${escapeHtml(file.name)}')" data-search="${escapeHtml((displayName + ' ' + file.content).toLowerCase())}">
            <div class="memory-card-title">${escapeHtml(displayName)}</div>
            <div class="memory-card-preview">${escapeHtml(preview)}</div>
            ${taskBadge}
            <div style="margin-top: ${taskBadge ? '4' : '8'}px; font-size: 11px; color: var(--text-muted);">${escapeHtml(file.name)}</div>
          </div>
        `;
      }

      // Subdirectory files
      for (const [dirName, files] of Object.entries(memoryData.memoryDirs)) {
        for (const file of files) {
          const p = file.parsed;
          const title = p.title || getDisplayName(file.name);
          const preview = getPreview(file.content, 120);
          const info = allFileTaskInfo.get(dirName + '/' + file.name);
          const taskBadge = info && info.hasTaskContent
            ? `<div style="display: flex; align-items: center; gap: 6px; margin-top: 6px; font-size: 11px; color: var(--accent); font-weight: 500;">📋 ${info.checkedCount}/${info.checkboxCount} tasks</div>`
            : '';

          html += `
            <div class="memory-card" onclick="openFileModal('${escapeHtml(dirName)}', '${escapeHtml(file.name)}')" data-search="${escapeHtml((title + ' ' + dirName + ' ' + file.content).toLowerCase())}">
              <div class="memory-card-title">${escapeHtml(title)}</div>
              <div class="memory-card-preview">${escapeHtml(preview)}</div>
              ${taskBadge}
              <div style="margin-top: ${taskBadge ? '4' : '8'}px; font-size: 11px; color: var(--text-muted);">${escapeHtml(dirName)}/${escapeHtml(file.name)}</div>
            </div>
          `;
        }
      }

      if (!memoryData.memoryFiles.length && !Object.keys(memoryData.memoryDirs).length) {
        html += `<div class="brain-empty"><p>No .md files found in this folder</p></div>`;
      }

      html += '</div>';
      memoryContentContainer.innerHTML = html;
    }

    function switchToFileTab(fileName) {
      const tabName = fileName.replace('.md', '');
      const tabs = memoryTabsContainer.querySelectorAll('.memory-tab');
      tabs.forEach(t => {
        if (t.dataset.tab === 'file-' + tabName) {
          memoryTabsContainer.querySelectorAll('.memory-tab').forEach(tb => tb.classList.remove('active'));
          t.classList.add('active');
          renderMemoryContent();
        }
      });
    }

    function renderMemoryOverview() {
      if (!memoryData.claudeMd) return;

      let statsHtml = '<div class="stats">';
      for (const [dirName, files] of Object.entries(memoryData.memoryDirs)) {
        let count;
        if (dirName === 'context') {
          count = 0;
          for (const file of files) {
            const p = file.parsed;
            count += Object.keys(p.fields).length;
            for (const table of p.tables) { count += table.rows.length; }
            for (const [sName, sContent] of Object.entries(p.sections)) {
              if (sContent && sName !== '_intro') {
                count += sContent.split('\n').filter(l => l.trim() && !l.trim().startsWith('|')).length;
              }
            }
          }
        } else {
          count = files.length;
        }
        statsHtml += `
          <div class="stat">
            <div class="stat-value">${count}</div>
            <div class="stat-label">${dirName}</div>
          </div>
        `;
      }
      statsHtml += '</div>';

      const claudeContent = renderMarkdownToHtml(memoryData.claudeMd.content);

      memoryContentContainer.innerHTML = `
        ${statsHtml}
        <div class="file-card">
          <div class="file-card-header" onclick="this.nextElementSibling.classList.toggle('expanded'); this.querySelector('.toggle').textContent = this.nextElementSibling.classList.contains('expanded') ? '\u2212' : '+'">
            <span class="file-card-title">CLAUDE.md</span>
            <span class="toggle" style="color: var(--text-muted);">&minus;</span>
          </div>
          <div class="file-card-content expanded markdown-content">${claudeContent}</div>
        </div>
        <button onclick="openEditModal('CLAUDE.md', 'claudeMd')" style="margin-top: 10px;">Edit CLAUDE.md</button>
      `;
    }

    function renderMemoryFile(fileName) {
      const file = memoryData.memoryFiles.find(f => f.name === fileName);
      if (!file) return;

      const content = renderMarkdownToHtml(file.content);
      const taskInfo = detectTaskContent(file.content);

      let taskBanner = '';
      if (taskInfo.hasTaskContent) {
        const pct = taskInfo.checkboxCount > 0 ? Math.round((taskInfo.checkedCount / taskInfo.checkboxCount) * 100) : 0;
        taskBanner = `
          <div style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--bg-secondary); border: 1px solid var(--accent); border-radius: 10px; margin-bottom: 12px;">
            <div style="flex: 1;">
              <div style="font-weight: 600; font-size: 13px; color: var(--text-primary); margin-bottom: 4px;">
                📋 ${taskInfo.checkboxCount} task${taskInfo.checkboxCount !== 1 ? 's' : ''} detected
                <span style="color: var(--text-muted); font-weight: 400;">(${taskInfo.checkedCount} done · ${pct}%)</span>
              </div>
              <div style="height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;">
                <div style="width: ${pct}%; height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s;"></div>
              </div>
            </div>
            <button class="primary" onclick="importMemoryToTasks('${escapeHtml(fileName)}', false, null)" style="white-space: nowrap; font-size: 13px;">
              → Import to Tasks
            </button>
          </div>
        `;
      }

      memoryContentContainer.innerHTML = `
        ${taskBanner}
        <div class="file-card">
          <div class="file-card-header">
            <span class="file-card-title">${escapeHtml(fileName)}</span>
          </div>
          <div class="file-card-content expanded markdown-content">${content}</div>
        </div>
        <div style="display: flex; gap: 8px; margin-top: 12px;">
          <button onclick="openEditModal('${escapeHtml(fileName)}', 'memoryFile')">Edit</button>
          <button onclick="renameMemoryFile('${escapeHtml(fileName)}')" style="color: var(--text-secondary);">Rename</button>
          <button onclick="deleteMemoryFile('${escapeHtml(fileName)}')" class="brain-delete-btn">Delete</button>
        </div>
      `;
    }

    function renderMemoryDirectory(dirName) {
      const files = memoryData.memoryDirs[dirName] || [];

      // Context directory uses flat list view
      if (dirName === 'context') {
        renderMemoryDirectoryFlat(dirName, files);
        return;
      }

      // All other directories use card grid view
      let html = `
        <div class="search-box">
          <span style="color: var(--text-muted);">&#128269;</span>
          <input type="text" placeholder="Search ${dirName}..." id="dirSearch" oninput="filterMemoryDirectory('${dirName}', this.value)">
        </div>
        <div class="memory-grid" id="dirGrid">
      `;

      for (const file of files) {
        const p = file.parsed;
        const title = p.title || getDisplayName(file.name);

        let fieldsHtml = '';
        const fieldEntries = Object.entries(p.fields).slice(0, 3);
        if (fieldEntries.length > 0) {
          fieldsHtml = '<div class="memory-card-fields">';
          for (const [key, value] of fieldEntries) {
            fieldsHtml += `
              <div class="memory-card-field">
                <span class="memory-card-field-label">${escapeHtml(key)}</span>
                <span class="memory-card-field-value">${escapeHtml(value)}</span>
              </div>
            `;
          }
          fieldsHtml += '</div>';
        }

        let preview = '';
        for (const [sectionName, sectionContent] of Object.entries(p.sections)) {
          if (sectionContent && sectionName !== '_intro') {
            preview = getPreview(sectionContent, 100);
            break;
          }
        }
        if (!preview) preview = getPreview(p.rawContent, 100);

        html += `
          <div class="memory-card" onclick="openFileModal('${dirName}', '${file.name}')" data-search="${escapeHtml((title + ' ' + JSON.stringify(p.fields) + ' ' + p.rawContent).toLowerCase())}">
            <div class="memory-card-title">${escapeHtml(title)}</div>
            ${fieldsHtml}
            <div class="memory-card-preview">${escapeHtml(preview)}</div>
          </div>
        `;
      }

      html += `
        <div class="add-btn" onclick="openNewFileModal('${dirName}')">
          + Add to ${dirName}
        </div>
      </div>`;

      memoryContentContainer.innerHTML = html;
    }

    function renderMemoryDirectoryFlat(dirName, files) {
      let html = `
        <div class="search-box">
          <span style="color: var(--text-muted);">&#128269;</span>
          <input type="text" placeholder="Search ${dirName}..." id="dirSearch" oninput="filterMemoryDirectory('${dirName}', this.value)">
        </div>
        <div id="dirGrid">
      `;

      for (const file of files) {
        const p = file.parsed;

        // Render fields as a key-value table
        const fieldEntries = Object.entries(p.fields);
        if (fieldEntries.length > 0) {
          html += `<div class="file-card" style="margin-bottom: 16px;"><table class="memory-flat-table"><tbody>`;
          for (const [key, value] of fieldEntries) {
            html += `<tr data-search="${escapeHtml((key + ' ' + value).toLowerCase())}"><td>${escapeHtml(key)}</td><td>${escapeHtml(value)}</td></tr>`;
          }
          html += `</tbody></table></div>`;
        }

        // Render parsed tables (teams, tools, etc.) as proper HTML tables
        for (const table of p.tables) {
          html += `<div class="file-card" style="margin-bottom: 16px;"><table class="memory-flat-table"><thead><tr>`;
          for (const h of table.headers) {
            html += `<th>${escapeHtml(h)}</th>`;
          }
          html += `</tr></thead><tbody>`;
          for (const row of table.rows) {
            const searchData = row.join(' ').toLowerCase();
            html += `<tr data-search="${escapeHtml(searchData)}">`;
            for (const cell of row) {
              html += `<td>${escapeHtml(cell)}</td>`;
            }
            html += `</tr>`;
          }
          html += `</tbody></table></div>`;
        }

        // Render non-table section content as list items
        for (const [sectionName, sectionContent] of Object.entries(p.sections)) {
          if (!sectionContent || sectionName === '_intro') continue;
          const lines = sectionContent.split('\n').filter(l => l.trim() && !l.trim().startsWith('|'));
          if (lines.length === 0) continue;
          html += `<div class="file-card" style="margin-bottom: 16px;"><table class="memory-flat-table"><thead><tr><th colspan="2">${escapeHtml(sectionName)}</th></tr></thead><tbody>`;
          for (const line of lines) {
            const cleanLine = line.replace(/^[-*]\s*/, '').replace(/\*\*(.+?)\*\*/g, '$1').trim();
            if (!cleanLine) continue;
            html += `<tr data-search="${escapeHtml((sectionName + ' ' + cleanLine).toLowerCase())}"><td colspan="2">${escapeHtml(cleanLine)}</td></tr>`;
          }
          html += `</tbody></table></div>`;
        }
      }

      html += `</div>`;
      memoryContentContainer.innerHTML = html;
    }

    function filterMemoryDirectory(dirName, searchTerm) {
      const grid = document.getElementById('dirGrid');
      const items = grid.querySelectorAll('.memory-card, tr[data-search]');
      const search = searchTerm.toLowerCase();
      items.forEach(item => {
        const searchData = item.dataset.search || '';
        item.style.display = (!search || searchData.includes(search)) ? '' : 'none';
      });
    }

    function renderMarkdownToHtml(md) {
      let html = escapeHtml(md);

      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
      html = html.replace(/```[\s\S]*?```/g, match => {
        const code = match.replace(/```\w*\n?/g, '');
        return '<pre><code>' + code + '</code></pre>';
      });
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      html = html.replace(/(\|.+\|\n\|[-| ]+\|\n(?:\|.+\|\n?)+)/g, match => {
        const lines = match.trim().split('\n');
        const headers = lines[0].split('|').filter(c => c.trim());
        const rows = lines.slice(2).map(row => row.split('|').filter(c => c.trim()));
        let table = '<table><thead><tr>';
        headers.forEach(h => table += `<th>${h.trim()}</th>`);
        table += '</tr></thead><tbody>';
        rows.forEach(row => {
          table += '<tr>';
          row.forEach(cell => table += `<td>${cell.trim()}</td>`);
          table += '</tr>';
        });
        table += '</tbody></table>';
        return table;
      });
      html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
      html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
      html = html.replace(/^(?!<[hupol]|<li|<table|<pre)(.+)$/gm, '<p>$1</p>');
      html = html.replace(/<p><\/p>/g, '');
      html = html.replace(/<p>\s*<\/p>/g, '');

      return html;
    }

          const file = memoryData.memoryFiles.find(f => f.name === fileName);

          match = files.some(f => f.content.toLowerCase().includes(q) || f.name.toLowerCase().includes(q));

    /**
     * Index all files from the currently loaded Memory folder into the database.
     * Merges by name+folder — updates existing, adds new.
     */
    function indexMemoryToDb() {
      if (!memoryDirHandle) return;
      const folderName = memoryDirHandle.name;
      const now = Date.now();

      // Helper to upsert a record
      function upsert(name, folder, content) {
        const taskInfo = detectTaskContent(content);
        const record = {
          id: folder + '/' + name,
          name: name,
          folder: folder,
          folderName: folderName,
          preview: getPreview(content, 200),
          content: content,
          taskCount: taskInfo.checkboxCount,
          tasksDone: taskInfo.checkedCount,
          added: now,
          size: content.length
        };

        const idx = memoryDb.findIndex(r => r.id === record.id);
        if (idx >= 0) {
          // Update existing — keep original added date
          record.added = memoryDb[idx].added;
          memoryDb[idx] = record;
        } else {
          memoryDb.push(record);
        }
      }

      // Index CLAUDE.md / README.md
      if (memoryData.claudeMd) {
        const name = memoryData.memoryFiles.find(f => f.name.toLowerCase() === 'readme.md') ? 'README.md' : 'CLAUDE.md';
        upsert(name, folderName, memoryData.claudeMd.content);
      }

      // Index root .md files
      for (const file of memoryData.memoryFiles) {
        upsert(file.name, folderName, file.content);
      }

      // Index subdirectory files
      for (const [dirName, files] of Object.entries(memoryData.memoryDirs)) {
        for (const file of files) {
          upsert(file.name, folderName + '/' + dirName, file.content);
        }
      }

      persistMemoryDb();
      renderMemoryDb();
    }

    function sortMemoryDb(key) {

    function getSortedFilteredDb() {
      let rows = [...memoryDb];

      // Filter
      if (memDbFilter) {
        rows = rows.filter(r =>
          r.name.toLowerCase().includes(memDbFilter) ||
          r.folder.toLowerCase().includes(memDbFilter) ||
          r.preview.toLowerCase().includes(memDbFilter)
        );
      }

      // Sort
      const { key, dir } = memDbSort;
      rows.sort((a, b) => {
        let va, vb;
        if (key === 'name') { va = a.name.toLowerCase(); vb = b.name.toLowerCase(); }
        else if (key === 'folder') { va = a.folder.toLowerCase(); vb = b.folder.toLowerCase(); }
        else if (key === 'preview') { va = a.preview.toLowerCase(); vb = b.preview.toLowerCase(); }
        else if (key === 'tasks') { va = a.taskCount; vb = b.taskCount; }
        else if (key === 'added') { va = a.added; vb = b.added; }
        else { va = a[key]; vb = b[key]; }

        if (va < vb) return dir === 'asc' ? -1 : 1;
        if (va > vb) return dir === 'asc' ? 1 : -1;
        return 0;
      });

      return rows;
    }

    /**
     * Detect task-like content in markdown:
     * - [ ] / - [x] checkboxes
     * - Numbered outlines with actionable phrasing
     * Returns { hasTaskContent, checkboxCount, checkedCount, sections[] }
     */
    function detectTaskContent(content) {
      const lines = content.split('\n');
      const result = { hasTaskContent: false, checkboxCount: 0, checkedCount: 0, sections: [] };
      let currentSection = null;

      for (const line of lines) {
        // Detect ## headers as potential task sections
        const headerMatch = line.match(/^## (.+)$/);
        if (headerMatch) {
          currentSection = headerMatch[1].replace(/\*+/g, '').trim();
        }

        // Detect checkbox items: - [ ] or - [x]
        if (line.match(/^- \[[ xX]\]/)) {
          result.hasTaskContent = true;
          result.checkboxCount++;
          if (line.match(/^- \[[xX]\]/)) result.checkedCount++;

          // Track which section this belongs to
          const sectionName = currentSection || 'Tasks';
          if (!result.sections.find(s => s.name === sectionName)) {
            result.sections.push({ name: sectionName, total: 0, done: 0 });
          }
          const sec = result.sections.find(s => s.name === sectionName);
          sec.total++;
          if (line.match(/^- \[[xX]\]/)) sec.done++;
        }
      }

      return result;
    }

    /**
     * Import a Memory file's task content into the Tasks board.
     * Merges with existing tasks — doesn't overwrite.
     */
    function importMemoryToTasks(fileName, isDirFile, dirName) {
      let content = '';

      if (isDirFile && dirName) {
        const files = memoryData.memoryDirs[dirName] || [];
        const file = files.find(f => f.name === fileName);
        if (file) content = file.content;
      } else {
        const file = memoryData.memoryFiles.find(f => f.name === fileName);
        if (file) content = file.content;
      }

      if (!content) { showStatus('File not found'); return; }

      const detection = detectTaskContent(content);
      if (!detection.hasTaskContent) {
        showStatus('No task checkboxes found in this file');
        return;
      }

      // Parse the file using the existing task parser
      const parsed = parseTaskMarkdown(content);

      if (parsed.sections.length === 0) {
        // File has checkboxes but no ## headers — create a section from the filename
        const sectionName = getDisplayName(fileName);
        const sectionId = taskSectionId(sectionName);

        if (!tasks[sectionId]) {
          sections.push({ id: sectionId, name: sectionName });
          tasks[sectionId] = [];
        }

        // Manually parse checkbox lines into the section
        const lines = content.split('\n');
        for (const line of lines) {
          if (line.match(/^- \[[ xX]\]/)) {
            const checked = line.match(/\[[xX]\]/) !== null;
            let text = line.replace(/^- \[[ xX]\]\s*/, '');
            let title = text;
            let note = '';

            const boldMatch = text.match(/^\*\*(.+?)\*\*(.*)$/);
            if (boldMatch) {
              title = boldMatch[1];
              note = boldMatch[2].replace(/^\s*-\s*/, '').trim();
            }

            // Avoid duplicates — check by title
            const exists = tasks[sectionId].some(t => t.title === title);
            if (!exists) {
              tasks[sectionId].push({
                id: Date.now() + Math.random(),
                title,
                note,
                checked,
                subtasks: [],
                section: sectionId
              });
            }
          }
        }
      } else {
        // File has ## sections — merge each one
        for (const sec of parsed.sections) {
          if (!tasks[sec.id]) {
            sections.push(sec);
            tasks[sec.id] = [];
          }

          for (const task of (parsed.tasks[sec.id] || [])) {
            // Avoid duplicates
            const exists = tasks[sec.id].some(t => t.title === task.title);
            if (!exists) {
              task.section = sec.id;
              tasks[sec.id].push(task);
            }
          }
        }
      }

      markChanged();
      persistTasks();
      renderTasks();

      // Switch to Tasks tab to show imported items
      switchMainTab('tasks');
      switchTaskView('board');

      const total = detection.checkboxCount;
      const done = detection.checkedCount;
      showStatus(`Imported ${total} task${total !== 1 ? 's' : ''} (${done} already done) from ${fileName}`);
    }

    /**
     * Import ALL task-containing files from a Memory folder at once.
     */
    function importAllMemoryTasks() {
      if (!memoryDirHandle) { showStatus('Open a folder first'); return; }

      let importCount = 0;
      let fileCount = 0;

      // Scan root .md files
      for (const file of memoryData.memoryFiles) {
        const det = detectTaskContent(file.content);
        if (det.hasTaskContent) {
          importMemoryToTasks(file.name, false, null);
          fileCount++;
          importCount += det.checkboxCount;
        }
      }

      // Scan subdirectory .md files
      for (const [dirName, files] of Object.entries(memoryData.memoryDirs)) {
        for (const file of files) {
          const det = detectTaskContent(file.content);
          if (det.hasTaskContent) {
            importMemoryToTasks(file.name, true, dirName);
            fileCount++;
            importCount += det.checkboxCount;
          }
        }
      }

      if (fileCount === 0) {
        showStatus('No files with task checklists found');
      }
      // Status already shown by individual imports
    }

    // Expose to onclick handlers
    window.importMemoryToTasks = importMemoryToTasks;
    window.importAllMemoryTasks = importAllMemoryTasks;

    // ============================================================
    // ===== BRAIN (Personal Knowledge Base) =====
    // ============================================================

    let brainCategories = lsGet('brain_categories', ['General', 'Ideas', 'Projects', 'People', 'Reference']);
    let brainEntries = lsGet('brain_entries', []);
    let brainActiveCategory = lsGet('brain_activeCategory', 'All');
    let brainSearchTerm = '';

    function persistBrain() {
      lsSet('brain_categories', brainCategories);
      lsSet('brain_entries', brainEntries);
      lsSet('brain_activeCategory', brainActiveCategory);
      queueDbSave();
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
    }

    function formatDate(ts) {
      const d = new Date(ts);
      const now = new Date();
      const diff = now - d;
      if (diff < 60000) return 'just now';
      if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
      if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
      if (diff < 604800000) return Math.floor(diff / 86400000) + 'd ago';
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: d.getFullYear() !== now.getFullYear() ? 'numeric' : undefined });
    }

    function renderBrain() {
      renderBrainCategories();
      renderBrainEntries();
    }

    function renderBrainCategories() {
      const catList = document.getElementById('brainCatList');
      const allCount = brainEntries.length;

      let html = `<button class="brain-cat-btn ${brainActiveCategory === 'All' ? 'active' : ''}" onclick="selectBrainCategory('All')">
        All <span class="cat-count">${allCount}</span>
      </button>`;

      for (const cat of brainCategories) {
        const count = brainEntries.filter(e => e.category === cat).length;
        html += `<button class="brain-cat-btn ${brainActiveCategory === cat ? 'active' : ''}" onclick="selectBrainCategory('${escapeHtml(cat)}')">
          ${escapeHtml(cat)} <span class="cat-count">${count}</span>
        </button>`;
      }

      // Uncategorized
      const uncatCount = brainEntries.filter(e => !e.category || !brainCategories.includes(e.category)).length;
      if (uncatCount > 0) {
        html += `<button class="brain-cat-btn ${brainActiveCategory === '_uncategorized' ? 'active' : ''}" onclick="selectBrainCategory('_uncategorized')">
          Uncategorized <span class="cat-count">${uncatCount}</span>
        </button>`;
      }

      catList.innerHTML = html;
    }

    function selectBrainCategory(cat) {
      brainActiveCategory = cat;
      lsSet('brain_activeCategory', cat);
      renderBrain();
    }

    function getFilteredBrainEntries() {
      let entries = [...brainEntries];

      // Category filter
      if (brainActiveCategory !== 'All') {
        if (brainActiveCategory === '_uncategorized') {
          entries = entries.filter(e => !e.category || !brainCategories.includes(e.category));
        } else {
          entries = entries.filter(e => e.category === brainActiveCategory);
        }
      }

      // Search filter
      if (brainSearchTerm) {
        const s = brainSearchTerm.toLowerCase();
        entries = entries.filter(e =>
          e.title.toLowerCase().includes(s) ||
          e.content.toLowerCase().includes(s) ||
          (e.tags || []).some(t => t.toLowerCase().includes(s))
        );
      }

      // Sort by updated desc
      entries.sort((a, b) => b.updated - a.updated);
      return entries;
    }

    function renderBrainEntries() {
      const container = document.getElementById('brainEntries');
      const entries = getFilteredBrainEntries();

      if (entries.length === 0 && brainEntries.length === 0) {
        container.innerHTML = `
          <div class="brain-empty">
            <p>Your brain is empty — for now</p>
            <span style="font-size: 14px;">Click <strong>+ New Entry</strong> to start building your personal knowledge base.</span>
          </div>
        `;
        return;
      }

      if (entries.length === 0) {
        container.innerHTML = `<div class="brain-empty"><p>No entries match your search</p></div>`;
        return;
      }

      let html = '';
      for (const entry of entries) {
        const preview = entry.content.substring(0, 160).replace(/\n/g, ' ');
        const tagsHtml = (entry.tags || []).map(t => `<span class="brain-tag">${escapeHtml(t)}</span>`).join('');

        html += `
          <div class="brain-entry" onclick="openBrainEntry('${entry.id}')">
            <div class="brain-entry-header">
              <span class="brain-entry-title">${escapeHtml(entry.title)}</span>
              <span class="brain-entry-date">${formatDate(entry.updated)}</span>
            </div>
            <div class="brain-entry-preview">${escapeHtml(preview)}</div>
            ${tagsHtml ? `<div class="brain-entry-tags">${tagsHtml}</div>` : ''}
          </div>
        `;
      }

      container.innerHTML = html;
    }

    function openBrainEntry(id) {
      const entry = brainEntries.find(e => e.id === id);
      if (!entry) return;

      document.getElementById('modalTitle').textContent = 'Edit Entry';
      document.getElementById('modalBody').innerHTML = `
        <div class="brain-detail-content">
          <div class="brain-detail-meta">
            <input type="text" id="brainEntryTitle" value="${escapeHtml(entry.title)}" placeholder="Title">
            <select id="brainEntryCat" style="background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 14px; color: var(--text-primary); font-family: inherit; min-width: 140px;">
              ${brainCategories.map(c => `<option value="${escapeHtml(c)}" ${entry.category === c ? 'selected' : ''}>${escapeHtml(c)}</option>`).join('')}
            </select>
          </div>
          <div class="brain-detail-meta">
            <input type="text" id="brainEntryTags" value="${escapeHtml((entry.tags || []).join(', '))}" placeholder="Tags (comma-separated)">
          </div>
          <textarea id="brainEntryContent" style="width: 100%; min-height: 280px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 14px; font-family: 'Inter', sans-serif; font-size: 14px; color: var(--text-primary); resize: vertical; line-height: 1.6;">${escapeHtml(entry.content)}</textarea>
        </div>
      `;

      // Replace footer with brain-specific one
      const footer = document.querySelector('.modal-footer');
      footer.innerHTML = `
        <button class="brain-delete-btn" onclick="deleteBrainEntry('${entry.id}')">Delete</button>
        <div>
          <button id="modalCancel" onclick="closeModal()">Cancel</button>
          <button class="primary" onclick="saveBrainEntry('${entry.id}')">Save</button>
        </div>
      `;

      modalOverlay.classList.add('visible');
      modalOverlay.dataset.type = 'brainEntry';
      modalOverlay.dataset.entryId = id;
    }

    function openNewBrainEntry() {
      const defaultCat = brainActiveCategory !== 'All' && brainActiveCategory !== '_uncategorized' ? brainActiveCategory : brainCategories[0] || 'General';

      document.getElementById('modalTitle').textContent = 'New Entry';
      document.getElementById('modalBody').innerHTML = `
        <div class="brain-detail-content">
          <div class="brain-detail-meta">
            <input type="text" id="brainEntryTitle" value="" placeholder="Title" autofocus>
            <select id="brainEntryCat" style="background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 14px; color: var(--text-primary); font-family: inherit; min-width: 140px;">
              ${brainCategories.map(c => `<option value="${escapeHtml(c)}" ${c === defaultCat ? 'selected' : ''}>${escapeHtml(c)}</option>`).join('')}
            </select>
          </div>
          <div class="brain-detail-meta">
            <input type="text" id="brainEntryTags" value="" placeholder="Tags (comma-separated)">
          </div>
          <textarea id="brainEntryContent" style="width: 100%; min-height: 280px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 14px; font-family: 'Inter', sans-serif; font-size: 14px; color: var(--text-primary); resize: vertical; line-height: 1.6;" placeholder="Write anything — notes, ideas, reference material..."></textarea>
        </div>
      `;

      const footer = document.querySelector('.modal-footer');
      footer.innerHTML = `
        <div></div>
        <div>
          <button id="modalCancel" onclick="closeModal()">Cancel</button>
          <button class="primary" onclick="saveBrainEntry(null)">Save</button>
        </div>
      `;

      modalOverlay.classList.add('visible');
      modalOverlay.dataset.type = 'brainEntry';
      modalOverlay.dataset.entryId = '';
    }

    function saveBrainEntry(id) {
      const title = document.getElementById('brainEntryTitle').value.trim();
      const content = document.getElementById('brainEntryContent').value;
      const category = document.getElementById('brainEntryCat').value;
      const tagsRaw = document.getElementById('brainEntryTags').value;
      const tags = tagsRaw.split(',').map(t => t.trim()).filter(Boolean);

      if (!title) { showStatus('Title is required'); return; }

      const now = Date.now();

      if (id) {
        const entry = brainEntries.find(e => e.id === id);
        if (entry) {
          entry.title = title;
          entry.content = content;
          entry.category = category;
          entry.tags = tags;
          entry.updated = now;
        }
      } else {
        brainEntries.push({
          id: generateId(),
          title,
          content,
          category,
          tags,
          created: now,
          updated: now
        });
      }

      persistBrain();
      closeModal();
      restoreModalFooter();
      renderBrain();
      showStatus(id ? 'Entry updated' : 'Entry created');
    }

    function deleteBrainEntry(id) {
      if (!confirm('Delete this entry?')) return;
      brainEntries = brainEntries.filter(e => e.id !== id);
      persistBrain();
      closeModal();
      restoreModalFooter();
      renderBrain();
      showStatus('Entry deleted');
    }

    function addBrainCategory() {
      const name = prompt('New category name:');
      if (!name || !name.trim()) return;
      const trimmed = name.trim();
      if (brainCategories.includes(trimmed)) { showStatus('Category already exists'); return; }
      brainCategories.push(trimmed);
      persistBrain();
      renderBrain();
      showStatus('Category added');
    }

    // Restore modal footer to default (for memory tab re-use)
    function restoreModalFooter() {
      const footer = document.querySelector('.modal-footer');
      footer.innerHTML = `
        <button id="modalCancel">Cancel</button>
        <button id="modalSave" class="primary">Save</button>
      `;
      document.getElementById('modalCancel').addEventListener('click', closeModal);
      document.getElementById('modalSave').addEventListener('click', saveModal);
    }

    // Brain event listeners
    document.getElementById('addEntryBtn').addEventListener('click', openNewBrainEntry);
    document.getElementById('addCatBtn').addEventListener('click', addBrainCategory);
    document.getElementById('brainSearchInput').addEventListener('input', (e) => {
      brainSearchTerm = e.target.value;
      renderBrainEntries();
    });

    // Expose to onclick handlers
    window.selectBrainCategory = selectBrainCategory;
    window.openBrainEntry = openBrainEntry;
    window.saveBrainEntry = saveBrainEntry;
    window.deleteBrainEntry = deleteBrainEntry;

    // ============================================================
    // ===== INITIALIZATION (restore from localStorage) =====
    // ============================================================

    // Restore task view if we have cached data
    if (sections.length > 0 && Object.keys(tasks).length > 0) {
      // We have cached task data — render it
      const boardEmptyState = document.getElementById('boardEmptyState');
      if (boardEmptyState) boardEmptyState.style.display = 'none';

      if (currentView === 'list') {
        document.getElementById('boardViewBtn').classList.remove('active');
        document.getElementById('listViewBtn').classList.add('active');
      }

      // Use a short delay to ensure DOM is ready
      setTimeout(() => {
        if (typeof renderBoard === 'function') renderBoard();
        if (typeof renderList === 'function') renderList();
        const boardEl = document.getElementById('board');
        const listEl = document.getElementById('listView');
        if (currentView === 'list') {
          boardEl.style.display = 'none';
          listEl.style.display = 'block';
        } else {
          boardEl.style.display = 'flex';
          listEl.style.display = 'none';
        }
        if (taskFileName) filePathEl.textContent = taskFileName;
      }, 50);
    }

    // Initialize Memory Database view
    renderMemoryDb();
    // Set initial memory view state
    if (currentMemoryView === 'database') {
      document.getElementById('memoryDbView').style.display = 'flex';
      document.getElementById('memoryBrowseView').style.display = 'none';
    } else {
      document.getElementById('memoryDbView').style.display = 'none';
      document.getElementById('memoryBrowseView').style.display = 'flex';
    }

    // Restore active tab
    switchMainTab(activeMainTab);

    // Check if we need to offer DB restore
    initDatabase();
  </script>
</body>
</html>
