# Secrets: dotenvx decrypts .env.production at build + function runtime via DOTENV_KEY
[build]
  command = "node ./scripts/check-env-production-encrypted.mjs --file .env.production && pnpm exec dotenvx run -f .env.production -- pnpm run build:ci"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20.19.1"
  # Disable mise so Netlify's configured Node/toolchain is used instead of any mise-managed runtime.
  MISE_DISABLE = "1"
  # Allow specific environment variable names to pass secret scanning since
  # their values are required during builds but are not written to the public build output.
  SECRETS_SCAN_OMIT_KEYS = "CORS_ALLOW"

[context.production]

[context.deploy-preview]

[context.production.environment]
  NODE_ENV = "production"

[functions]
  directory = "netlify/functions"
  # Ensure certain deps are not bundled and are resolved from node_modules
  node_bundler = "esbuild"
  included_files = [".env.production"]
  # dotenvx must remain external so it resolves at /var/task/node_modules/ at runtime
  external_node_modules = ["@dotenvx/dotenvx"]

[functions.environment]
  NODE_OPTIONS = "--require /var/task/node_modules/@dotenvx/dotenvx/src/lib/config.js" # dotenvx runtime decryption

[functions.masterBackfill]
  node_module_format = "esm"

[dev]
  command = "pnpm run dev"
  targetPort = 3333
  port = 8888
  framework = "#custom"

[dev.environment]
  SANITY_STUDIO_PORT = "3333"

[context.dev.environment]
  NODE_OPTIONS = "" # Local dev: no AWS secrets shim.

[[scheduled_function]]
  name = "syncMarketingAttribution"
  schedule = "0 2 * * *"

[[scheduled_function]]
  name = "update-customer-segments"
  schedule = "30 3 * * *"

# Bypass redirect for known static assets
[[redirects]]
  from = "/site.webmanifest"
  to = "/site.webmanifest"
  status = 200

[[redirects]]
  from = "/webhooks/sanity-order-sync"
  to = "/.netlify/functions/sanity-order-sync-webhook"
  status = 200
  force = true

[[redirects]]
  from = "/webhooks/sanity-product-sync"
  to = "/.netlify/functions/sanity-product-sync-webhook"
  status = 200
  force = true

[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.ico"
  status = 200

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

# Redirect frontend routes to main site (if they somehow hit this backend site)
# These routes should be handled by fas-cms-fresh, not fas-sanity
[[redirects]]
  from = "/checkout"
  to = "https://www.fasmotorsports.com/checkout"
  status = 301
  force = true

[[redirects]]
  from = "/checkout/*"
  to = "https://www.fasmotorsports.com/checkout/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/vendor-portal/*"
  to = "https://www.fasmotorsports.com/vendor-portal/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "https://www.fasmotorsports.com/:splat"
  status = 301
  force = true
  conditions = { Host = ["fasmotorsports.us", "www.fasmotorsports.us"] }

# SPA catch-all for Sanity Studio (served at fassanity.fasmotorsports.com)
# NOTE: This site should NOT receive requests for www.fasmotorsports.com/checkout
# If /checkout is returning 301, check Netlify DNS/routing configuration to ensure
# www.fasmotorsports.com routes to fas-cms-fresh, not fas-sanity
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
